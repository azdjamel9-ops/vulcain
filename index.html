// ── ZAHRA CONFIRMEES (filtrées depuis Sheets) ──
function rZahraConfirmees(div){
  getAPI('confirmations',function(r){
    var all=r.confirmations||[];
    var filDate=localStorage.getItem('vz_fd')||'Tous';
    var filSit=localStorage.getItem('vz_fs')||'Tous';
    var today_=today();
    var hier=new Date(Date.now()-864e5).toLocaleDateString('fr-FR');
    var html='<div class="filter-row">';
    ['Tous',"Aujourd'hui",'Hier'].forEach(function(f){
      var key=f.replace("'","\'");
      html+='<button class="fbtn'+(f===filDate?' on':'')+'" onclick="setZFil(&quot;d&quot;,&quot;'+f+'&quot;)">'+f+'</button>';
    });
    html+='</div><div class="filter-row">';
    ['Tous','CONFIRME','ANNULE','INJOIGNABLE','FAUX','RAPPELER'].forEach(function(f){
      html+='<button class="fbtn'+(f===filSit?' on':'')+'" onclick="setZFil(&quot;s&quot;,&quot;'+f+'&quot;)">'+f+'</button>';
    });
    html+='</div>';
    var filtered=all.filter(function(c){
      var cDate=String(c.date||'').trim();
      if(filDate==="Aujourd'hui"&&cDate!==today_)return false;
      if(filDate==='Hier'&&cDate!==hier)return false;
      var eStr=String(c.etat||'').toUpperCase().trim();
      if(filSit!=='Tous'&&!eStr.includes(filSit))return false;
      return true;
    });
    // Tri récent → ancien
    filtered.sort(function(a,b){
      var da=String(a.date||'').split('/').reverse().join('-');
      var db=String(b.date||'').split('/').reverse().join('-');
      return db.localeCompare(da);
    });
    html+='<div class="slt">'+filtered.length+' résultat(s)</div>';
    if(!filtered.length){html+='<div class="empty">Aucun résultat</div>';}
    else{
      filtered.forEach(function(c){
        var e=String(c.etat||'').toUpperCase();
        var cls=e.includes('CONFIRM')?'lg':(e.includes('FAUX')||e.includes('ANNUL'))?'lr':'lo';
        var bcls=e.includes('CONFIRM')?'bg':(e.includes('FAUX')||e.includes('ANNUL'))?'br':'bo';
        html+='<div class="li '+cls+'"><div class="li-row"><div style="flex:1">'
          +'<div class="li-nm">'+h(c.nom)+_srcBadge(c.numCmd)+'</div>'
          +'<div class="li-sb">'+h(c.variant||c.produit)+' · '+h(c.wilaya)+'</div>'
          +'<div class="li-sb">'+h(c.date||'')+' · '+h(c.confirmedBy||'')+'</div>'
          +'<div class="li-sb" style="color:var(--gold)">'+fmt(c.montant)+' DA</div>'
          +'</div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'
          +'<div class="bdg '+bcls+'">'+h(c.etat)+'</div>'
            +'<button class="btn-sm" style="background:#555;font-size:10px;margin-top:2px" onclick="_editCmd('+_cmdeIdx(div,c.numCmd)+')">✏️ Modifier</button>'
          +'</div></div></div>';
      });
    }
    div.innerHTML=html;
  });
}

function setZFil(type,val){
  localStorage.setItem(type==='d'?'vz_fd':'vz_fs',val);
  rZahraConfirmees(document.querySelector('.tc'));
}

// ── ZAHRA JOURNEE ──
function rZahraJour(div){
  var tday=today();
  var saved=JSON.parse(localStorage.getItem('vz_t')||'{}');
  var td=saved[tday]||{};
  if(!td.finition) td.finition={q:0,prods:[]};
  if(!td.bio) td.bio={q:0};

  function qProd(tid,pn){
    var t=td[tid];if(!t||!t.prods)return 0;
    var f=t.prods.find(function(p){return p.prod===pn;});return f?f.q:0;
  }
  window._chProd=function(el){
    var tid=el.dataset.t, pn=el.dataset.p, d=parseInt(el.dataset.d)||0;
    if(!td[tid]) td[tid]={q:0,prods:[]};
    var t=td[tid]; if(!t.prods)t.prods=[];
    var f=t.prods.find(function(p){return p.prod===pn;});
    if(f){f.q=Math.max(0,f.q+d);if(f.q===0)t.prods=t.prods.filter(function(p){return p.prod!==pn;});}
    else if(d>0){t.prods.push({prod:pn,q:d});}
    t.q=t.prods.reduce(function(s,p){return s+p.q;},0);
    saved[tday]=td;
    localStorage.setItem('vz_t',JSON.stringify(saved));
    rZahraJour(div);
  };

  var totFin=td.finition.q||0;

  var html='<div class="kpi2" style="margin-bottom:12px">'
    +'<div class="kbox"><div class="kval" style="color:#378ADD">'+totFin+'</div><div class="klbl">✨ Finitions</div></div>'
    +'<div class="kbox"><div class="kval" style="color:var(--g)">'+(td.bio&&td.bio.q||0)+'</div><div class="klbl">🔥 Remplissages</div></div>'
    +'</div>';

  function renderSection(tacheId, color, ic){
    PRODS_FINIS.forEach(function(p){
      var q=qProd(tacheId,p);
      var active=q>0;
      var dp=h(p).replace(/"/g,'&quot;');
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;'
        +'background:'+(active?'rgba('+color+',.12)':'#0A0A14')
        +';border-radius:12px;margin-bottom:6px;border:1.5px solid '
        +(active?'rgba('+color+',.6)':'rgba(255,255,255,.07)')+';">'
        +'<div style="flex:1;font-size:13px;font-weight:'+(active?700:400)+';color:'+(active?'#fff':'#aaa')+'">'+h(p)+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<button data-t="'+tacheId+'" data-p="'+dp+'" data-d="-1" onclick="_chProd(this)"'
          +' style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1">−</button>'
        +'<div style="min-width:28px;text-align:center;font-size:16px;font-weight:700;color:'+(active?'rgb('+color+')':'#888')+'">'+q+'</div>'
        +'<button data-t="'+tacheId+'" data-p="'+dp+'" data-d="1" onclick="_chProd(this)"'
          +' style="width:30px;height:30px;border-radius:8px;background:rgba('+color+',.2);border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1">+</button>'
        +'</div></div>';
    });
  }

  html+='<div class="slt">✨ Finition et emballage</div>';
  renderSection('finition','55,138,221','✨');

  // Autres tâches (bio, noest)
  var autresTaches=TACHES.filter(function(t){return !t.prod;});
  if(autresTaches.length){
    html+='<div class="slt" style="margin-top:8px">Autres tâches</div><div id="tl">';
    autresTaches.forEach(function(t){
      var ck=!!td[t.id];
      html+='<div id="ti'+t.id+'" class="ti'+(ck?' ck':'')+'" data-tid="'+t.id+'" onclick="togT(this.dataset.tid)">'
        +'<div class="ti-chk">'+(ck?'✓':'')+'</div>'
        +'<div class="ti-nm">'+t.ic+' '+t.n+'</div>';
      if(t.q){
        html+='<div class="tq" onclick="event.stopPropagation()">'
          +'<button class="tqb m" data-tid="'+t.id+'" onclick="chT(this.dataset.tid,-1)">−</button>'
          +'<div class="tqv" id="tv'+t.id+'">'+(td[t.id]?td[t.id].q||0:0)+'</div>'
          +'<button class="tqb p" data-tid="'+t.id+'" onclick="chT(this.dataset.tid,1)">+</button></div>';
      }
      html+='</div>';
    });
    html+='</div>';
  }

  // Résumé du jour
  var bioQ=td.bio&&td.bio.q||0;
  if(totFin>0||bioQ>0){
    html+='<div class="slt" style="margin-top:8px">Résumé aujourd\'hui</div>';
    td.finition.prods.forEach(function(p){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(55,138,221,.08);border-radius:10px;margin-bottom:4px">'
        +'<span>✨ '+h(p.prod)+'</span><span style="font-weight:700;color:#378ADD">×'+p.q+'</span></div>';
    });
    if(bioQ>0){
      html+='<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(231,76,60,.08);border-radius:10px;margin-bottom:4px">'
        +'<span>🔥 Biocombustible rempli</span><span style="font-weight:700;color:var(--r)">×'+bioQ+'</span></div>';
    }
  }

  html+='<button class="btn btn-a" onclick="envJour()" style="margin-top:14px">📤 Envoyer ma journée</button>';
  div.innerHTML=html;
}

function togT(id){
  var t=TACHES.find(function(x){return x.id===id;});
  if(!t)return;
  if(t.prod){
    // Panier multi-produits — on peut ajouter plusieurs produits
    var tday=today();
    var s=JSON.parse(localStorage.getItem('vz_t')||'{}');
    if(!s[tday])s[tday]={};
    if(!s[tday][id])s[tday][id]={q:0,prods:[]};
    if(!s[tday][id].prods)s[tday][id].prods=[];

    function renderPanier(){
      var panier=s[tday][id].prods;
      var panierHtml='';
      if(panier.length){
        panierHtml='<div style="margin-bottom:10px;border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden">';
        panier.forEach(function(p,pi){
          panierHtml+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(39,174,96,.08)">'
            +'<span style="font-size:13px">'+h(p.prod)+'</span>'
            +'<div style="display:flex;align-items:center;gap:8px">'
            +'<span style="font-weight:700;color:var(--g)">×'+p.q+'</span>'
            +'<button onclick="rmPanierItem('+pi+')" style="background:rgba(231,76,60,.3);border:none;border-radius:6px;color:#fff;padding:2px 7px;cursor:pointer;font-size:12px">✕</button>'
            +'</div></div>';
        });
        panierHtml+='</div>';
      }
      return panierHtml;
    }

    function openPopup(){
      var pOpts=PRODS_FINIS.map(function(p){
        return '<div class="opt" data-p="'+h(p)+'" onclick="selProdT(this)" style="font-size:12px;padding:8px 10px">'+h(p)+'</div>';
      }).join('');

      showOv(t.ic+' '+t.n,
        renderPanier()
        +'<div class="ct" style="margin:8px 0 6px">Ajouter un produit</div>'
        +'<div class="opts" style="flex-wrap:wrap;gap:4px;margin-bottom:10px" id="popPrOpts">'+pOpts+'</div>'
        +'<div class="qrow" style="margin-bottom:6px">'
        +'<button class="qb m" onclick="var e=document.getElementById(&quot;pqd&quot;);e.textContent=Math.max(1,parseInt(e.textContent)-1)">−</button>'
        +'<div class="qdisp" id="pqd">1</div>'
        +'<button class="qb p" onclick="var e=document.getElementById(&quot;pqd&quot;);e.textContent=parseInt(e.textContent)+1">+</button>'
        +'</div>'
        +'<button class="btn" style="background:rgba(52,152,219,.3);width:100%;margin-bottom:8px" onclick="ajouterAuPanier()">+ Ajouter au panier</button>',
        function(){
          // Confirmer tout le panier
          if(!s[tday][id].prods.length){alert('Ajoute au moins un produit');return;}
          s[tday][id].q=s[tday][id].prods.reduce(function(t,p){return t+p.q;},0);
          localStorage.setItem('vz_t',JSON.stringify(s));
          var el=document.getElementById('ti'+id);
          if(el){el.classList.add('ck');el.querySelector('.ti-chk').textContent='✓';}
          var qel=document.getElementById('tq'+id);
          if(qel)qel.textContent=s[tday][id].q;
        },'Confirmer ('+s[tday][id].prods.length+' produit(s))');

      window._togTid=id;
      window._togTs=s;
      window._togTday=tday;
    }

    window.ajouterAuPanier=function(){
      var selEl=document.querySelector('#popPrOpts .opt.on');
      if(!selEl){alert('Sélectionne un produit');return;}
      var prod=selEl.dataset.p;
      var qty=parseInt(document.getElementById('pqd').textContent)||1;
      var id2=window._togTid, tday2=window._togTday, s2=window._togTs;
      // Vérifier si produit déjà dans panier → incrémenter
      var exist=s2[tday2][id2].prods.find(function(p){return p.prod===prod;});
      if(exist){exist.q+=qty;}
      else{s2[tday2][id2].prods.push({prod:prod,q:qty});}
      localStorage.setItem('vz_t',JSON.stringify(s2));
      // Rafraîchir popup
      openPopup();
    };

    window.rmPanierItem=function(pi){
      var id2=window._togTid, tday2=window._togTday, s2=window._togTs;
      s2[tday2][id2].prods.splice(pi,1);
      localStorage.setItem('vz_t',JSON.stringify(s2));
      openPopup();
    };

    openPopup();
  } else {
    var tday=today();
    var s=JSON.parse(localStorage.getItem('vz_t')||'{}');
    if(!s[tday])s[tday]={};
    var was=!!s[tday][id];
    if(was){
      delete s[tday][id];
      // Remettre le compteur visuel à 0 si présent
      var qElD=document.getElementById('tv'+id);
      if(qElD) qElD.textContent='0';
    } else {
      // Lire la quantité affichée dans le compteur (peut avoir été incrémentée avant le clic)
      var curQ=1;
      var qEl=document.getElementById('tv'+id);
      if(qEl){ curQ=parseInt(qEl.textContent)||0; if(curQ<1) curQ=1; qEl.textContent=curQ; }
      s[tday][id]={q:curQ};
    }
    localStorage.setItem('vz_t',JSON.stringify(s));
    var el=document.getElementById('ti'+id);
    if(el){el.classList.toggle('ck',!was);el.querySelector('.ti-chk').textContent=was?'':'✓';}
  }
}
function selProdT(el){
  document.querySelectorAll('#popPrOpts .opt').forEach(function(e){e.classList.remove('on');});
  el.classList.add('on');
}
function chT(id,d){
  var el=document.getElementById('tv'+id);if(!el)return;
  var nv=Math.max(0,(parseInt(el.textContent)||0)+d);
  el.textContent=nv;
  var tday=today();
  var s=JSON.parse(localStorage.getItem('vz_t')||'{}');
  if(!s[tday])s[tday]={};
  // Créer l'entrée si elle n'existe pas encore
  if(!s[tday][id])s[tday][id]={q:0};
  s[tday][id].q=nv;
  localStorage.setItem('vz_t',JSON.stringify(s));
  // Mettre à jour la coche visuelle si qty > 0
  var tiEl=document.getElementById('ti'+id);
  if(tiEl){
    tiEl.classList.toggle('ck',nv>0);
    tiEl.querySelector('.ti-chk').textContent=nv>0?'✓':'';
  }
}
function envJour(){
  var tday=today();
  var s=JSON.parse(localStorage.getItem('vz_t')||'{}');
  var td=s[tday]||{};
  var done=Object.keys(td);
  if(!done.length){alert('Aucune tache cochée !');return;}
  send({source:'ZAHRA_JOURNEE',date:tday,taches:td},function(){
    var msg='Zahra - '+tday+'\n\n';
    done.forEach(function(id){var t=TACHES.find(function(t){return t.id===id;});if(t)msg+='✓ '+t.n+(td[id].q?' ('+td[id].q+')':'')+'\n';});
    showSuc('✅','Journée enregistrée !','Bonne journée Zahra 💪',[{lbl:'📱 Résumé Nesrine',href:waLink(WA.nesrine,msg),bg:'#6C3483'}]);
  });
}

function rZahraProd(div){
  getAPI('confirmations',function(r){
    var all=r.confirmations||[];
    var tday=today();
    var saved=JSON.parse(localStorage.getItem('vz_t')||'{}');
    // Stats confirmations toutes dates groupées par jour
    var byDay={};
    all.forEach(function(c){
      var d=c.date||'?';
      if(!byDay[d])byDay[d]={total:0,confirme:0,faux:0,injoignable:0,rappeler:0};
      byDay[d].total++;
      var e=String(c.etat||'').toUpperCase();
      if(e.includes('CONFIRM'))byDay[d].confirme++;
      else if(e.includes('FAUX'))byDay[d].faux++;
      else if(e.includes('INJOI'))byDay[d].injoignable++;
      else if(e.includes('RAPPEL'))byDay[d].rappeler++;
    });
    // Stats journée Zahra (localStorage) par jour
    var jDays=Object.keys(saved).sort().reverse();

    var html='<div class="slt">Résumé du jour — '+tday+'</div>';
    // Confirmation du jour
    var dj=byDay[tday]||{total:0,confirme:0,faux:0,injoignable:0,rappeler:0};
    var tj=saved[tday]||{};
    var finQty=(tj.finition&&tj.finition.q)||0;
    var embQty=(tj.emballage&&tj.emballage.q)||0;
    var bioQty=(tj.bio&&tj.bio.q)||0;
    html+='<div class="kpi2" style="margin-bottom:12px">'
      +'<div class="kbox"><div class="kval" style="color:#378ADD">'+dj.total+'</div><div class="klbl">Commandes traitées</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--g)">'+dj.confirme+'</div><div class="klbl">Confirmées</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--r)">'+dj.faux+'</div><div class="klbl">Faux</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--o)">'+dj.injoignable+'</div><div class="klbl">Injoignable</div></div>'
      +'</div>'
      +'<div class="kpi2" style="margin-bottom:16px">'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+finQty+'</div><div class="klbl">Finitions</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+embQty+'</div><div class="klbl">Emballages</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+bioQty+'</div><div class="klbl">Bioéthanol</div></div>'
      +'</div>';
    // Détail finitions du jour
    if(tj.finition&&tj.finition.prods&&tj.finition.prods.length){
      html+='<div class="slt">Finitions</div>';
      tj.finition.prods.forEach(function(p){
        html+='<div class="li lg"><div class="li-row"><div class="li-nm">'+h(p.prod)+'</div>'
          +'<div style="font-weight:700;color:var(--gold)">×'+p.q+'</div></div></div>';
      });
    }
    if(tj.emballage&&tj.emballage.prods&&tj.emballage.prods.length){
      html+='<div class="slt">Emballages</div>';
      tj.emballage.prods.forEach(function(p){
        html+='<div class="li lo"><div class="li-row"><div class="li-nm">'+h(p.prod)+'</div>'
          +'<div style="font-weight:700;color:var(--gold)">×'+p.q+'</div></div></div>';
      });
    }
    // Historique par jour
    html+='<div class="slt">Historique</div>';
    var days=Object.keys(byDay).sort().reverse().slice(0,10);
    if(!days.length){html+='<div class="empty">Aucun historique</div>';}
    else{
      days.forEach(function(d){
        var dd=byDay[d];
        var jd=saved[d]||{};
        var fq=(jd.finition&&jd.finition.q)||0;
        var eq=(jd.emballage&&jd.emballage.q)||0;
        html+='<div class="li lo"><div class="li-row"><div>'
          +'<div class="li-nm">'+d+'</div>'
          +'<div class="li-sb">'+dd.total+' traitées · '+dd.confirme+' confirmées · '+dd.faux+' faux</div>'
          +(fq||eq?'<div class="li-sb">✨'+fq+' finitions · 📦'+eq+' emballages</div>':'')
          +'</div></div></div>';
      });
    }
    div.innerHTML=html;
  });
}
function rZahraInv(div){
  var filInv = localStorage.getItem('vz_inv_fil')||'finis'; // par défaut produits finis

  // ── Filtre ──
  var html='<div class="filter-row" style="margin-bottom:12px">'
    +'<button class="fbtn'+(filInv==='finis'?' on':'')+'" data-f="finis" onclick="setInvFil(this)">📦 Produits finis</button>'
    +'<button class="fbtn'+(filInv==='matieres'?' on':'')+'" data-f="matieres" onclick="setInvFil(this)">🔧 Matières premières</button>'
    +'</div>';

  if(filInv==='finis'){
    // ── Produits finis depuis STOCK ── skeleton immédiat
    div.innerHTML = html
      +'<div class="slt">📦 Produits finis</div>'
      + _skelHtml(6);
    _renderStock('stock_zahra', div, {
      titre:    '📦 Produits finis — cliquez pour modifier',
      grille:   false,
      editable: true,
      _prefix:  html   // injecter le filtre avant le contenu
    });
  } else {
    // ── Matières premières ──
    getAPI('stock_intrants',function(r){
      var stored=r.intrants||[];
      var inv=JSON.parse(localStorage.getItem('vz_inv_data')||'[]');
      var last=localStorage.getItem('vz_id');
      var shMap={};stored.forEach(function(i){shMap[i.id]=i;});
      var data=INV.map(function(i){
        var ls=inv.find(function(x){return x.id===i.id;});
        var sh=shMap[i.id];
        var qty=ls?ls.qty:(sh?sh.actuel:0);
        return {id:i.id,n:i.n,em:i.em,min:i.min,qty:qty};
      });
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<div style="font-size:11px;color:#888">Dernier inventaire: '+(last||'jamais')+'</div>'
        +'<button class="btn-sm" style="background:var(--ac)" onclick="startInv()">Inventaire complet</button>'
        +'</div>'
        +'<div style="font-size:11px;color:#888;margin-bottom:8px">Cliquez pour modifier</div>';
      data.forEach(function(it){
        var cls=it.qty>=it.min?'sok':it.qty>0?'slow':'salt';
        var col=it.qty>=it.min?'var(--g)':it.qty>0?'var(--o)':'var(--r)';
        html+='<div class="si" data-id="'+it.id+'" data-n="'+h(it.n)+'" data-em="'+h(it.em||'📦')+'" data-qty="'+it.qty+'" data-min="'+it.min+'" onclick="editInvById(this)" style="cursor:pointer">'
          +'<div class="si-ic">'+(it.em||'📦')+'</div>'
          +'<div style="flex:1"><div class="si-nm">'+h(it.n)+'</div><div class="si-sb">Min: '+it.min+'</div></div>'
          +'<div style="text-align:right">'
          +'<div style="font-size:22px;font-weight:900;color:'+col+'">'+it.qty+'</div>'
          +'<div class="si-bd '+cls+'">'+( it.qty>=it.min?'OK':it.qty>0?'Bas':'Vide')+'</div>'
          +'</div></div>';
      });
      div.innerHTML=html;
    });
  }
}

}

function editInvById(el){

function editInvItem(id,name,em,val,min){
  showOv((em||'📦')+' '+name,
    '<div style="text-align:center;margin-bottom:12px">'
    +'<div style="font-size:11px;color:#888">Actuel: <b style="color:#fff">'+val+'</b> · Min: <b style="color:var(--o)">'+min+'</b></div>'
    +'</div>'
    +'<div class="qrow" style="margin-bottom:6px">'
    +'<button class="qb m" onclick="var e=document.getElementById(&quot;iq&quot;);e.textContent=Math.max(0,parseInt(e.textContent)-1)">−</button>'
    +'<div class="qdisp" id="iq">'+val+'</div>'
    +'<button class="qb p" onclick="var e=document.getElementById(&quot;iq&quot;);e.textContent=parseInt(e.textContent)+1">+</button>'
    +'</div>'
    +'<div class="qa-row" style="justify-content:center">'
    +[0,1,2,3,5,10].map(function(v){return '<button class="qa" onclick="document.getElementById(&quot;iq&quot;).textContent='+v+'">'+v+'</button>';}).join('')
    +'</div>',
    function(){
      var nv=parseInt(document.getElementById('iq').textContent)||0;
      // Mettre à jour localStorage
      var inv=JSON.parse(localStorage.getItem('vz_inv')||'[]');
      var it=inv.find(function(i){return i.id===id;});
      if(it){it.qty=nv;}else{inv.push({id:id,qty:nv});}
      localStorage.setItem('vz_inv',JSON.stringify(inv));
      // Envoyer à Sheets
      send({source:'UPDATE_INVENTAIRE',id:id,valeur:nv},function(){
        showSuc('✅','Mis à jour !',name+' → '+nv,[]);
        // Recharger l'onglet inventaire
        setTimeout(function(){
          var tc=document.querySelector('.tc');
          if(tc)rZahraInv(tc);
        },600);
      });
    },'Confirmer');
}
function startInv(){invStep=0;invD={};stepInv();}
function stepInv(){
  var div=document.querySelector('.tc');if(!div)return;
  if(invStep>=INV.length){finInv();return;}
  var it=INV[invStep];
  var pct=Math.round(invStep/INV.length*100);
  var prev=JSON.parse(localStorage.getItem('vz_inv')||'[]');
  var prevIt=prev.find(function(i){return i.id===it.id;});
  var def=prevIt?prevIt.qty:0;
  var html='<div><div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:6px">'
    +'<span>'+(invStep+1)+' / '+INV.length+'</span><span>'+pct+'%</span></div>'
    +'<div class="prog"><div class="prog-f" style="width:'+pct+'%"></div></div></div>'
    +'<div class="card" style="text-align:center">'
    +'<div style="font-size:60px;margin-bottom:10px">'+it.em+'</div>'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:4px">'+h(it.n)+'</div>'
    +'<div style="font-size:11px;color:#888;margin-bottom:14px">Min: '+it.min+'</div>'
    +'<div class="qrow"><button class="qb m" onclick="chInv(-1)">−</button>'
    +'<div class="qdisp" id="iqd">'+def+'</div>'
    +'<button class="qb p" onclick="chInv(1)">+</button></div>'
    +'<div class="qa-row" style="justify-content:center">';
  [0,5,10,20,50].filter(function(v){return v<=it.min*3||v===0;}).forEach(function(v){
    html+='<button class="qa" onclick="document.getElementById(\'iqd\').textContent='+v+'">'+v+'</button>';
  });
  html+='</div></div>'
    +'<div style="display:flex;gap:10px;margin-top:14px">'
    +(invStep>0?'<button class="btn btn-gr" style="flex:0 0 80px;padding:14px" onclick="invStep--;stepInv()">←</button>':'')
    +'<button class="btn btn-a" style="flex:1;padding:14px" onclick="nxtInv()">'+(invStep<INV.length-1?'Suivant →':'✅ Terminer')+'</button></div>';
  div.innerHTML=html;
}
function chInv(d){var e=document.getElementById('iqd');if(e)e.textContent=Math.max(0,(parseInt(e.textContent)||0)+d);}
function nxtInv(){invD[INV[invStep].id]=parseInt(document.getElementById('iqd').textContent)||0;invStep++;stepInv();}
function finInv(){
  var tday=today();
  var result=INV.map(function(i){return Object.assign({},i,{qty:invD[i.id]||0});});
  localStorage.setItem('vz_inv',JSON.stringify(result));
  localStorage.setItem('vz_id',tday);
  send({source:'ZAHRA_INVENTAIRE',date:tday,inventaire:invD},function(){
    var al=result.filter(function(i){return i.qty<i.min;});
    var msg='Inventaire Zahra - '+tday+'\n\n';
    result.forEach(function(i){msg+=(i.qty>=i.min?'✅':'⚠️')+' '+i.n+': '+i.qty+'\n';});
    showSuc('✅','Inventaire terminé !',result.length+' articles · '+al.length+' alerte(s)',[
      {lbl:'📱 Envoyer Nesrine',href:waLink(WA.nesrine,msg),bg:'#6C3483'}
    ]);
  });
}

function rNesDash(div){
  var fil=localStorage.getItem('ndash_fil')||'mois';
  div.innerHTML='<div class="slt">📊 Dashboard Nesrine</div>'+_skelHtml(6);

  getAPIs(['commandes_bilel','commandes_confirmation','livraisons_bilel','depenses_bilel','suivi_noest'],function(_d){
    var rCmdes=_d['commandes_bilel']||{};
    var rConf=_d['commandes_confirmation']||{};
    var rLiv=_d['livraisons_bilel']||{};
    var rDep=_d['depenses_bilel']||{};
    var rNoest=_d['suivi_noest']||{};

    var tday=today();
    var mois=tday.slice(3);

    function inPeriod(dateStr){
      if(!dateStr) return false;
      var d=normDate(dateStr);
      if(fil==='jour') return d===tday;
      if(fil==='mois') return d.length>=7&&d.slice(3)===mois;
      return true;
    }
    function srcOf(num){
      var n=String(num||'').trim();
      if(/^(FB_|fb_)/i.test(n)) return 'IA';
      if(/^(WA|wa)/i.test(n)) return 'Manuelle';
      return 'Shopify';
    }

    // ── Données ──
    var cmdesConf=rCmdes.commandes||[];
    var cmdesAConf=rConf.commandes||[];
    var confPer=cmdesConf.filter(function(c){return inPeriod(c.date);});
    var aConfPer=cmdesAConf.filter(function(c){return inPeriod(c.date);});
    var allPer=confPer.concat(aConfPer);
    var nbShop=0,nbIA=0,nbMan=0;
    allPer.forEach(function(c){var src=srcOf(c.numCmd);if(src==='Shopify')nbShop++;else if(src==='IA')nbIA++;else nbMan++;});
    var caConf=confPer.reduce(function(s,c){return s+parseFloat(c.montant||0);},0);
    var caAConf=aConfPer.reduce(function(s,c){return s+parseFloat(c.montant||0);},0);

    var livs=rLiv.livraisons||[];
    var dernierDepotMs=rLiv.dernierDepotMs||0;
    var dernierDepotDate=rLiv.dernierDepotDate||'';
    var livApres=livs.filter(function(l){return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE'))&&(l.timestampMs||0)>dernierDepotMs;});
    var depApres=(rDep.depenses||[]).filter(function(d){return d.statut!=='Remis'&&(d.timestampMs||0)>dernierDepotMs;});
    var recouvrApres=livApres.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var depensApres=depApres.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
    var soldeBilel=Math.max(0,recouvrApres-depensApres);

    var noestCmdes=rNoest.commandes||[];
    var noestEnCours=noestCmdes.filter(function(g){
      var sit=String(g.situation_final||'').toLowerCase();
      var sx=String(g.statut_noest||g.tracking_statut||'').toLowerCase();
      return g.tracking&&!sit.includes('livr')&&!sit.includes('retour')&&sx!=='livré'&&sx!=='livre';
    });
    var noestTotal=noestEnCours.reduce(function(s,g){return s+(g.total||0);},0);
    var totalEncaisser=soldeBilel+noestTotal;

    // ══ HTML — TOTAL EN TÊTE EN PREMIER ══
    var html='';

    // ① TOTAL À ENCAISSER — PREMIER BLOC, tout en haut
    html+='<div style="background:linear-gradient(135deg,rgba(241,196,15,.15),rgba(186,117,23,.1));border:2px solid rgba(241,196,15,.45);border-radius:18px;padding:16px;margin-bottom:14px">'
      +'<div style="font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:center">💰 Total à encaisser</div>'
      +'<div style="font-size:42px;font-weight:900;color:var(--gold);text-align:center;line-height:1">'+fmt(totalEncaisser)+' DA</div>'
      +'<div style="display:flex;gap:8px;margin-top:12px">'
        +'<div style="flex:1;background:rgba(0,0,0,.3);border-radius:10px;padding:8px;text-align:center">'
          +'<div style="font-size:13px;font-weight:800;color:#BA7517">'+fmt(soldeBilel)+'</div>'
          +'<div style="font-size:9px;color:#888;margin-top:2px">🚚 Bilel'+(dernierDepotDate?' depuis '+dernierDepotDate:'')+'</div>'
        +'</div>'
        +'<div style="flex:1;background:rgba(0,0,0,.3);border-radius:10px;padding:8px;text-align:center">'
          +'<div style="font-size:13px;font-weight:800;color:#4FC3F7">'+fmt(noestTotal)+'</div>'
          +'<div style="font-size:9px;color:#888;margin-top:2px">📡 Noest ('+noestEnCours.length+' colis)</div>'
        +'</div>'
      +'</div>'
    +'</div>';

    // ② FILTRES
    html+='<div class="filter-row" style="margin-bottom:12px">';
    [{k:'jour',l:"Aujourd'hui"},{k:'mois',l:'Ce mois'},{k:'tout',l:'Tout'}].forEach(function(f){
      html+='<button class="fbtn'+(f.k===fil?' on':'')+'" onclick="setNdashFil(\''+f.k+'\')">'+f.l+'</button>';
    });
    html+='</div>';

    // ③ ALERTES opérationnelles
    var alertes=[];
    if(aConfPer.length>0) alertes.push('📞 '+aConfPer.length+' commande(s) à confirmer');
    if(soldeBilel>0) alertes.push('💵 Bilel: '+fmt(soldeBilel)+' DA à remettre');
    if(noestEnCours.length>0) alertes.push('📡 '+noestEnCours.length+' colis Noest en transit');
    if(alertes.length){
      html+='<div style="background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:12px;padding:10px;margin-bottom:12px">';
      alertes.forEach(function(a){html+='<div style="font-size:11px;color:var(--r);padding:3px 0">⚠️ '+a+'</div>';});
      html+='</div>';
    }

    // ④ COMMANDES
    html+='<div style="font-size:11px;font-weight:700;color:#4FC3F7;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px">📦 Commandes</div>';
    html+='<div class="kpi2" style="margin-bottom:8px">'
      +'<div class="kbox"><div class="kval" style="color:#378ADD">'+allPer.length+'</div><div class="klbl">Total</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--g)">'+confPer.length+'</div><div class="klbl">Confirmées</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--o)">'+aConfPer.length+'</div><div class="klbl">À confirmer</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+fmt(caConf+caAConf)+'</div><div class="klbl">CA (DA)</div></div>'
    +'</div>';
    html+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
      +'<div style="flex:1;background:#185FA520;border:1px solid #185FA5;border-radius:12px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#4FC3F7">'+nbShop+'</div><div style="font-size:9px;color:#888;margin-top:2px">🛒 Shopify</div></div>'
      +'<div style="flex:1;background:#BA751720;border:1px solid #BA7517;border-radius:12px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#BA7517">'+nbMan+'</div><div style="font-size:9px;color:#888;margin-top:2px">📱 Manuelle</div></div>'
      +'<div style="flex:1;background:#6C348320;border:1px solid #6C3483;border-radius:12px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:#A569BD">'+nbIA+'</div><div style="font-size:9px;color:#888;margin-top:2px">🤖 IA Karim</div></div>'
    +'</div>';

    // ⑤ BILEL
    html+='<div style="font-size:11px;font-weight:700;color:#BA7517;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px">🚚 Bilel</div>';
    html+='<div style="background:rgba(186,117,23,.1);border:1px solid rgba(186,117,23,.3);border-radius:12px;padding:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:11px;color:#888">💵 À remettre</div>'+(dernierDepotDate?'<div style="font-size:9px;color:#666">depuis '+dernierDepotDate+'</div>':'')+'</div>'
      +'<div style="text-align:right"><div style="font-size:24px;font-weight:900;color:var(--gold)">'+fmt(soldeBilel)+' DA</div>'
      +'<div style="font-size:10px;color:#888">'+livApres.length+' livr. · −'+fmt(depensApres)+' dep.</div></div>'
    +'</div>';

    // ⑥ NOEST
    html+='<div style="font-size:11px;font-weight:700;color:#185FA5;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px">📡 Noest en transit</div>';

function calcMontantNes(){
  var np=document.getElementById('np');
  if(!np||!np.value)return;
  var val=np.value;
  var sz=document.getElementById('surm_zone');
  // Afficher le champ dimension si sur mesure
  if(val==='__surm_rosa__'||val==='__surm_bio__'){
    if(sz) sz.style.display='block';
    document.getElementById('nm_info').textContent='';
    return;
  }
  if(sz) sz.style.display='none';
  var prod=PRODS.find(function(p){return p.label===val;});
  if(!prod||!prod.prix)return;
  var qt=parseInt(getSel('qt'))||1;
  var total=prod.prix*qt;
  var el=document.getElementById('nm');
  if(el)el.value=total;
  updInfo();
}
function updSurmLabel(){
  // Met à jour l'info sous le champ dimension
  var dim=document.getElementById('surm_dim').value.trim();
  var info=document.getElementById('nm_info');
  if(info) info.textContent=dim?'Variante: '+dim+' (sur mesure)':'';
}
function updInfo(){
  var nm=parseInt(document.getElementById('nm')?document.getElementById('nm').value:0)||0;
  var qt=parseInt(getSel('qt'))||1;
  var info=document.getElementById('nm_info');
  if(info&&nm) info.textContent=fmt(Math.round(nm/qt))+' DA × '+qt+' = '+fmt(nm)+' DA';
}

function envNesCmde(){
  var nm=document.getElementById('nn').value.trim();
  var nt=document.getElementById('nt').value.trim();
  var nw=document.getElementById('nw').value;
  var st=getSel('st');
  var via=getSel('nc_via')||'';
  if(!nm){alert('Nom obligatoire');return;}
  if(!nt){alert('Tel obligatoire');return;}
  if(!nw){alert('Wilaya obligatoire');return;}
  if(!window._panier||!window._panier.length){alert('Ajoute au moins un article au panier !');return;}
  if(!st){alert('Statut obligatoire');return;}
  if(st==='CONFIRME'&&!via){alert('Choisis le transporteur !');return;}
  var _commune=document.getElementById('nc')?document.getElementById('nc').value||'':'';
  var notes=document.getElementById('nno')?document.getElementById('nno').value||'':'';
  var panier=window._panier.slice();
  var total=panier.reduce(function(s,a){return s+a.prix*a.qte;},0);
  var premiers_r=null;

  // Envoi SÉQUENTIEL : attendre la réponse avant d'envoyer le suivant
  // → évite la collision sur getLastRow() dans Apps Script
  function envoyerArticle(i){
    if(i>=panier.length){
      // Tout envoyé
      var num=premiers_r&&premiers_r.numManuel?premiers_r.numManuel:'WA'+Date.now().toString().slice(-5);
      var acts=[];
      if(st==='CONFIRME'){
        var lignes=panier.map(function(a){return '• '+a.label+' ×'+a.qte+' — '+fmt(a.prix*a.qte)+' DA';}).join('\n');
        var mb=num+' | '+nm+' | '+nw+'\n'+lignes+'\nCOD total: '+fmt(total)+' DA\nTel: '+nt;
        if(via==='Bilel'){
          acts.push({lbl:'📱 WA Bilel',href:waLink(WA.bilel,mb),bg:'#BA7517'});
        } else if(via==='Noest'){
          acts.push({lbl:'📱 WA client',href:waLink(nt,'Bonjour '+nm+'! Commande confirmée. Livraison sous 48h.'),bg:'#25D366'});
        }
      }
      window._panier=[];
      showSuc('✅','Commande enregistrée !',panier.length+' article(s) · '+fmt(total)+' DA'+(via?' — Via '+via:''),acts);
      return;
    }
    var article=panier[i];
    send({
      source:'NESRINE_COMMANDE',
      nom:nm,tel:nt,wilaya:nw,commune:_commune,adresse:'',
      produit:article.titre,variant:article.variant,
      qte:article.qte,montant:article.prix*article.qte,
      canal:getSel('cn')||'WhatsApp',statut:st,notes:notes,
      transporteur:via
    },function(r){
      if(i===0) premiers_r=r;
      envoyerArticle(i+1); // article suivant seulement après réponse
    });
  }
  envoyerArticle(0);
}

// ── NESRINE STOCK ──
function rNesStock(div){
  div.innerHTML='<div class="slt">Stock & Planification</div>'+_skelHtml(4);
  getAPIs(['stock_elec','commandes_bilel','stock_intrants'],function(_d){
    var stockElec=(_d['stock_elec']||{}).stock||[];
    var intrants=(_d['stock_intrants']||{}).intrants||[];
    var cmdesRaw=(_d['commandes_bilel']||{}).commandes||[];

    // Helper stock intrants
    function stockAct(id){var f=intrants.find(function(i){return i.id===id;});return f?(f.actuel||0):999;}
    function stockMn(id){var f=intrants.find(function(i){return i.id===id;});return f?(f.min||0):0;}

    // Filtrer commandes cheminées non livrées
    var cmdes=cmdesRaw.filter(function(c){
      var e=String(c.etat||c.statut||'').toUpperCase();
      var sit=String(c.situation||'').toLowerCase();
      var p=String(c.produit||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if(e.includes('FAUX')||e.includes('ANNUL')) return false;
      if(sit.includes('livr')||sit.includes('retour')) return false;
      return p.includes('rosa')||p.includes('electr')||p.includes('chim')||p.includes('elect');
    }).map(function(c){
      var dimMatch=String(c.variant||c.produit||'').match(/(\d+cm)/i);
      var dim=dimMatch?dimMatch[1]:'';
      var dimNum=dim.replace('cm','');
      var act=dim?stockAct('caisson_'+dimNum):999;
      var mn=dim?stockMn('caisson_'+dimNum):0;
      var etatUp=String(c.etat||'').toUpperCase();
      var isConf=etatUp.includes('CONFIRM');
      var prio=dim&&act===0?1:dim&&act<=mn?2:isConf?3:4;
      return Object.assign({},c,{dim:dim,act:act,mn:mn,prio:prio});
    });

    // Grouper commandes par dimension
    var dimMap={};
    var DIMS_ORDER=['80cm','100cm','120cm','140cm','160cm','200cm'];
    cmdes.forEach(function(c){
      var k=c.dim||'?';
      if(!dimMap[k]) dimMap[k]={dim:k,total:0,urgent:0,conf:0,attente:0,act:c.act,mn:c.mn,prio:4};
      dimMap[k].total++;
      dimMap[k].prio=Math.min(dimMap[k].prio,c.prio);
      if(c.prio<=2) dimMap[k].urgent++;
      if(String(c.etat||'').toUpperCase().includes('CONFIRM')) dimMap[k].conf++;
      else dimMap[k].attente++;
    });

    var html='';

    // ════════════════════════════════════
    // SECTION 1 — STOCK CHEMINÉES (grille)
    // ════════════════════════════════════
    html+='<div style="font-size:12px;font-weight:700;color:#aaa;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--brd)">⚡ STOCK CHEMINÉES ROSA</div>';

    if(!stockElec.length){
      html+='<div class="empty">Stock non initialisé</div>';
    } else {
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
      stockElec.forEach(function(s){
        var v=parseInt(s.actuel)||0;
        var min=parseInt(s.min)||10;
        var dim=String(s.dim||s.dimension||'');
        var col=v<=0?'#e74c3c':v<=min?'#e67e22':'#27ae60';
        var bg=v<=0?'rgba(231,76,60,.1)':v<=min?'rgba(230,126,34,.08)':'rgba(39,174,96,.07)';
        var badge=v<=0?'Vide':v<=min?'Bas':'OK';
        var badgeCls=v<=0?'br':v<=min?'bo':'bg';

        // Données planification pour cette dimension
        var dPlan=dimMap[dim]||null;
        var planRow='';
        if(dPlan){
          var pCol=dPlan.prio===1?'#e74c3c':dPlan.prio===2?'#e67e22':'#27ae60';
          var pIco=dPlan.prio===1?'🔴':dPlan.prio===2?'🟠':'📦';
          planRow='<div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.07)">'
            +'<div style="font-size:10px;color:#888">A produire</div>'
            +'<div style="font-size:18px;font-weight:900;color:'+pCol+'">'+dPlan.total+' <span style="font-size:10px;font-weight:400;color:#888">cmde'+(dPlan.total>1?'s':'')+'</span></div>'
            +(dPlan.urgent>0?'<div style="font-size:9px;color:'+pCol+';font-weight:700">'+pIco+' '+dPlan.urgent+' urgent'+(dPlan.urgent>1?'s':'')+'</div>':'')
          +'</div>';
        }

        html+='<div style="background:'+bg+';border:2px solid '+col+'50;border-radius:14px;padding:12px 10px;text-align:center">'
          +'<div style="font-size:11px;color:#aaa;font-weight:600;margin-bottom:2px">ROSA</div>'
          +'<div style="font-size:18px;font-weight:900;color:#fff">'+dim+'</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+col+';line-height:1.1;margin:4px 0">'+v+'</div>'
          +'<div class="bdg '+badgeCls+'" style="font-size:9px;margin:0 auto 2px;width:fit-content">'+badge+'</div>'
          +'<div style="font-size:9px;color:#666">min '+min+'</div>'
          +planRow
        +'</div>';
      });
      html+='</div>';
    }

    // ════════════════════════════════════
    // SECTION 2 — PLANIFICATION PRODUCTION
    // ════════════════════════════════════
    var totalCmdes=cmdes.length;
    var totalUrgent=cmdes.filter(function(c){return c.prio<=2;}).length;

    html+='<div style="font-size:12px;font-weight:700;color:#aaa;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--brd)">🏗️ PLANIFICATION PRODUCTION</div>';

    if(!totalCmdes){
      html+='<div class="empty">Aucune commande en cours</div>';
    } else {
      // Bannière urgence
      if(totalUrgent>0){
        html+='<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.35);border-radius:12px;padding:10px 14px;margin-bottom:12px">'
          +'<div style="font-size:13px;font-weight:700;color:#e74c3c">🔴 '+totalUrgent+' cheminee'+(totalUrgent>1?'s':'')+' urgente'+(totalUrgent>1?'s':'')+' — Stock epuise</div>'
          +'<div style="font-size:11px;color:#888;margin-top:2px">Moh doit produire en priorité</div>'
        +'</div>';
      }

      // Résumé global
      html+='<div style="display:flex;gap:8px;margin-bottom:12px">'
        +'<div style="flex:1;background:rgba(30,30,50,.8);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center">'
          +'<div style="font-size:22px;font-weight:900;color:#fff">'+totalCmdes+'</div>'
          +'<div style="font-size:10px;color:#888">commandes</div>'
        +'</div>'
        +'<div style="flex:1;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:10px;text-align:center">'
          +'<div style="font-size:22px;font-weight:900;color:#e74c3c">'+totalUrgent+'</div>'
          +'<div style="font-size:10px;color:#888">urgentes</div>'
        +'</div>'
        +'<div style="flex:1;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.25);border-radius:10px;padding:10px;text-align:center">'
          +'<div style="font-size:22px;font-weight:900;color:#27ae60">'+Object.keys(dimMap).length+'</div>'
          +'<div style="font-size:10px;color:#888">dimensions</div>'
        +'</div>'
      +'</div>';

      // Bouton WA Moh
      var urgentDims=Object.values(dimMap).filter(function(d){return d.prio<=2;}).sort(function(a,b){return a.prio-b.prio;});
      var allDims=Object.values(dimMap).sort(function(a,b){return a.prio-b.prio;});
      var lignes=urgentDims.length>0
        ? urgentDims.map(function(d){return (d.prio===1?'[URGENT]':'[BAS]')+' ROSA '+d.dim+' : '+d.urgent+' piece'+(d.urgent>1?'s':'');}).join('\n')
        : allDims.map(function(d){return 'ROSA '+d.dim+' : '+d.total+' piece'+(d.total>1?'s':'');}).join('\n');
      var msgMoh=urgentDims.length>0
        ? 'Salam Moh !\n\nAkhdem had les dimensions, rahoum urgent !\n\n'+lignes+'\n\nMerci !\n- Le Vulcain'
        : 'Salam Moh !\n\nLes commandes a produire :\n\n'+lignes+'\n\nMerci Moh !\n- Le Vulcain';

      html+='<a href="'+waLink(WA.moh,msgMoh)+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-weight:700;font-size:14px;margin-bottom:14px">'
        +'<span style="font-size:20px">📲</span>Envoyer a Moh sur WhatsApp'
      +'</a>';

      // Commandes confirmées (détail léger)
      var conf=cmdes.filter(function(c){return String(c.etat||'').toUpperCase().includes('CONFIRM');}).sort(function(a,b){return a.prio-b.prio;});
      if(conf.length>0){
        html+='<div style="font-size:11px;color:#aaa;font-weight:700;margin-bottom:6px">Commandes confirmées ('+conf.length+')</div>';
        conf.forEach(function(c){
          var col=c.prio===1?'rgba(231,76,60,.6)':c.prio===2?'rgba(243,156,18,.5)':'rgba(39,174,96,.3)';
          var ico=c.prio===1?'🔴':c.prio===2?'🟠':'✅';
          html+='<div class="li" style="border-left:3px solid '+col+';padding:8px 10px">'
            +'<div class="li-row">'
              +'<div style="flex:1"><div class="li-nm" style="font-size:12px">⚡ ROSA '+c.dim+'</div>'
                +'<div class="li-sb">'+h(c.wilaya||'—')+' · '+h(c.date||'—')+'</div></div>'
              +'<div style="font-size:11px;color:#aaa">'+ico+'</div>'
            +'</div>'
          +'</div>';
        });
      }
    }

    div.innerHTML=html;
  });

function genAchats(){
  getAPI('stock_intrants',function(r){
    var al=(r.intrants||[]).filter(function(i){return i.actuel<=i.min*1.5;});
    if(!al.length){alert('✅ Tous les intrants sont OK !');return;}
    var msg='LISTE ACHATS INTRANTS\n\n';
    al.forEach(function(a){msg+=(a.actuel<=a.min?'🚨':'⚠️')+' '+a.nom+': stock='+a.actuel+' (min='+a.min+') → commander '+Math.max(a.min*2-a.actuel,a.min)+'\n';});
    showSuc('🛒','Liste achats intrants',al.length+' à commander',[
      {lbl:'📱 Envoyer à Mehdi',href:waLink(WA.mehdi,msg),bg:'#185FA5'},
      {lbl:'📱 Envoyer à Bilel',href:waLink(WA.bilel,msg),bg:'#BA7517'}
    ]);
  });
}

// ── NESRINE CONFIRMATION ──
function rNesConfirm(div, _fil){
  var fil=_fil||localStorage.getItem('nesrine_conf_fil')||'Tous';
  getAPI('commandes_confirmation',function(r){
    var cmdes=r.commandes||[];

    function suiviBadge(etat){
      var e=String(etat||'').toUpperCase();
      if(!e||e==='EN ATTENTE') return '';
      if(e.includes('INJOIGN')) return '<span style="display:inline-block;margin-top:4px;background:rgba(231,76,60,.15);color:var(--r);border:1px solid rgba(231,76,60,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Injoignable</span>';
      if(e.includes('OCCUP'))  return '<span style="display:inline-block;margin-top:4px;background:rgba(231,76,60,.12);color:var(--o);border:1px solid rgba(231,76,60,.25);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Occupe</span>';
      if(e.includes('RAPPEL')) return '<span style="display:inline-block;margin-top:4px;background:rgba(52,152,219,.12);color:#4FC3F7;border:1px solid rgba(52,152,219,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">A rappeler</span>';
      if(e.includes('SHOWROOM')) return '<span style="display:inline-block;margin-top:4px;background:rgba(155,89,182,.15);color:#A569BD;border:1px solid rgba(155,89,182,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">🏛️ Showroom</span>';
      return '<span style="display:inline-block;margin-top:4px;background:rgba(136,136,136,.1);color:#888;padding:2px 8px;border-radius:6px;font-size:10px">'+h(etat)+'</span>';
    }
    function ordreEtat(e){
      var u=String(e||'').toUpperCase();
      if(u.includes('RAPPEL')) return 0;
      if(u.includes('INJOIGN')||u.includes('OCCUP')) return 1;
      return 2;
    }

    var nbNeuf=0,nbRappel=0,nbInj=0,nbOcc=0,nbShow=0;
    cmdes.forEach(function(c){
      var eu=String(c.etat||'').toUpperCase();
      if(eu.includes('RAPPEL')) nbRappel++;
      else if(eu.includes('INJOIGN')) nbInj++;
      else if(eu.includes('OCCUP')) nbOcc++;
      else if(eu.includes('SHOWROOM')) nbShow++;
      else nbNeuf++;
    });

    var filtrees=cmdes.filter(function(c){
      var eu=String(c.etat||'').toUpperCase();
      if(fil==='Tous') return true;
      if(fil==='Nouveau') return !eu||eu==='EN ATTENTE';
      if(fil==='Rappeler') return eu.includes('RAPPEL');
      if(fil==='Injoignable') return eu.includes('INJOIGN');
      if(fil==='Occupe') return eu.includes('OCCUP');
      if(fil==='Showroom') return eu.includes('SHOWROOM');
      return true;
    });

    var sorted=filtrees.slice().sort(function(a,b){return ordreEtat(a.etat)-ordreEtat(b.etat);});

    var html='';
    var FILTRES=[
      {k:'Tous',       l:'Tous ('+cmdes.length+')',    c:'#555'},
      {k:'Nouveau',    l:'Nouveau ('+nbNeuf+')',        c:'var(--g)'},
      {k:'Rappeler',   l:'Rappeler ('+nbRappel+')',     c:'#4FC3F7'},
      {k:'Injoignable',l:'Injoignable ('+nbInj+')',    c:'var(--r)'},
      {k:'Occupe',     l:'Occupe ('+nbOcc+')',         c:'var(--o)'},
      {k:'Showroom',   l:'Showroom ('+nbShow+')',       c:'#A569BD'},
    ];
    html+='<div class="filter-row" style="margin-bottom:10px;flex-wrap:wrap;gap:6px">';
    FILTRES.forEach(function(f){
      var on=f.k===fil;
      html+='<button class="fbtn'+(on?' on':'')+'" style="font-size:11px;'+(on?'background:'+f.c+';color:#fff;border-color:'+f.c:'color:'+f.c+';border-color:'+f.c)+'" onclick="_setNConfFil(\''+f.k+'\')">'+f.l+'</button>';
    });
    html+='</div>';

    html+='<div class="slt" style="margin-top:4px">A confirmer ('+sorted.length+')</div>';
    if(!sorted.length){html+='<div class="empty">Aucune commande dans ce filtre</div>';}
    else{
      sorted.forEach(function(c){
        var realIdx=cmdes.indexOf(c);
        var eu=String(c.etat||'').toUpperCase();
        var hasStatut=eu&&eu!=='EN ATTENTE'&&eu!=='';
        var borderCol=eu.includes('RAPPEL')?'rgba(52,152,219,.45)':eu.includes('INJOIGN')||eu.includes('OCCUP')?'rgba(231,76,60,.4)':'rgba(108,52,131,.3)';
        var prodDisplay=c.variant&&c.variant!==c.produit?h(c.variant):h(c.produit);
        var dimMatch=String(c.variant||c.produit||'').match(/(\d+cm)/i);
        var dimLabel=dimMatch?' <span style="background:rgba(233,69,96,.2);color:var(--ac);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700">'+dimMatch[1]+'</span>':'';
        html+='<div class="li" style="border-left:3px solid '+borderCol+'">'
          +'<div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(c.nom)+_srcBadge(c.numCmd)+'</div>'
            +'<div class="li-sb">'+prodDisplay+dimLabel+'</div>'
            +'<div class="li-sb" style="color:#aaa">'+h(c.wilaya)+' · '+h(c.date||'')+'</div>'
            +'<div class="li-sb" style="color:var(--gold)">'+fmt(c.montant)+' DA</div>'
            +(hasStatut?'<div style="margin-top:2px">'+suiviBadge(c.etat)+'</div>':'')
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'
            +'<a href="tel:'+h(c.tel)+'" style="background:var(--g);color:#fff;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none;text-align:center">📞</a>'
            +'<a href="'+waLink(c.tel,msgConfirmationClient(c))+'" target="_blank" style="display:block;background:#25D366;color:#fff;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none;text-align:center">WA</a>'
            +'<button class="btn-sm" style="background:var(--ac)" onclick="openNesConf('+realIdx+')">Resultat</button>'
            +'<button class="btn-sm" style="background:#444" onclick="_editCmd('+_cmdeIdx(div,c.numCmd)+')">Modifier</button>'
          +'</div>'
        +'</div></div>';
      });
    }
    div.innerHTML=html;
    div._cmdes=cmdes;
    div._confFil=fil;
  });
}
function _setNConfFil(f){
  localStorage.setItem('nesrine_conf_fil',f);
  var tc=document.querySelector('.tc');
  if(tc) rNesConfirm(tc,f);
}
function openNesConf(idx){
  var div=document.querySelector('.tc');
  var c=(div._cmdes||[])[idx];if(!c)return;
  SEL={};
  var elec=isElec(c.produit);
  var msgWaNes=msgConfirmationClient(c);
  var bodyNes='<div style="font-size:11px;color:#888;margin-bottom:10px">'+h(c.produit)+' · '+h(c.wilaya)+'<br>'+h(c.tel)+'</div>'
    +'<a href="'+waLink(c.tel,msgWaNes)+'" target="_blank" style="display:block;background:#25D366;color:#fff;text-align:center;padding:11px;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:12px;letter-spacing:.3px">'
    +'📲 Envoyer demande de confirmation WA</a>'
    +'<div class="opts" style="gap:8px">'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'CONFIRME\',\'sg\')">CONFIRME</div>'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'FAUX\',\'sr\')">FAUX</div>'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'ANNULE\',\'sr\')">ANNULE</div>'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'INJOIGNABLE\',\'so\')">INJOIGNABLE</div>'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'RAPPELER\',\'sb\')">RAPPELER</div>'
    +'<div class="opt" onclick="selOpt(\'ns\',this,\'SHOWROOM\',\'sb\')">🏛️ SHOWROOM</div>'
    +'</div>'
    +'<div style="margin-top:10px">'
    +'<div style="font-size:11px;color:#888;font-weight:600;margin-bottom:6px">Via quel transporteur ?</div>'
    +'<div class="opts c2">'
    +'<div class="opt" onclick="selOpt(\'nt\',this,\'Bilel\',\'so\')">Bilel</div>'
    +'<div class="opt" onclick="selOpt(\'nt\',this,\'Noest\',\'sb\')">Noest</div>'
    +'</div></div>';
  showOv('Confirmation — '+c.nom, bodyNes, function(){
    var stat=getSel('ns');if(!stat){alert('Selectionne !');return;}
    var transp=getSel('nt');
    if(stat==='CONFIRME'&&!transp){alert('Choisis le transporteur !');return;}
    // SHOWROOM : pas de transporteur
    send({source:'ZAHRA_CONFIRMATION',numCmd:c.numCmd,statut:stat,confirmedBy:'Nesrine',notes:'',transporteur:transp||''},function(r){
      var acts=[];
      if(stat==='CONFIRME'){
        var mb=c.numCmd+' | '+c.nom+' | '+c.wilaya+'\n'+c.produit+'\nCOD: '+fmt(c.montant)+' DA\nTel: '+c.tel;
        if(transp==='Bilel'){
          acts.push({lbl:'WA Bilel',href:waLink(WA.bilel,'Commande confirmee\n'+mb),bg:'#BA7517'});
          if(elec) acts.push({lbl:'Info Moh',href:waLink(WA.moh,'Cheminee confirmee\n'+c.numCmd+' | '+c.produit),bg:'#1D9E75'});
        } else {
          acts.push({lbl:'WA client',href:waLink(c.tel,'Bonjour '+c.nom+'! Commande confirmee. Livraison sous 48h.'),bg:'#25D366'});
        }
      }
      delete _apiCache['commandes_confirmation'];
      var tc=document.querySelector('.tc');
      var fil=tc&&tc._confFil?tc._confFil:'Tous';
      var statInterm=stat==='INJOIGNABLE'||stat==='OCCUPE'||stat==='RAPPELER';
      if(statInterm){
        showSuc('',stat,c.nom,[]);
        setTimeout(function(){if(tc) rNesConfirm(tc,fil);},700);
      } else {
        showSuc('',stat+(transp?' - Via '+transp:''),c.nom,acts);
        setTimeout(function(){if(tc) rNesConfirm(tc,fil);},1200);
      }
    });
  },'Valider');
}
function setNbFil(el){localStorage.setItem('nb_fil',el.dataset.f);rNesBilel(document.querySelector('.tc'));}
function rNesBilel(div){
  var filLiv=localStorage.getItem('nl_fil')||'Toutes';
  var filStat=localStorage.getItem('nl_stat')||'Toutes';

  getAPIs(['commandes_bilel','livraisons_bilel','livraisons_noest'],function(_nb){
  var r1=_nb['commandes_bilel']||{}, r2=_nb['livraisons_bilel']||{}, r3=_nb['livraisons_noest']||{};
  var allCmdes=(r1.commandes||[]).filter(function(c){
      var e=String(c.etat||c.statut||'').toUpperCase().trim();
      if(!e.includes('CONFIRM')||e.includes('FAUX')||e.includes('ANNUL')) return false;
      var sit=String(c.situation||'').toLowerCase();
      return !sit.includes('livr')&&!sit.includes('retour')&&!sit.includes('annul');
    });

    function getTransp(c){ return String(c.via||'').trim(); }

    var cmdesBilel=allCmdes.filter(function(c){return getTransp(c)==='Bilel';});
    var cmdesNoest=allCmdes.filter(function(c){return getTransp(c)==='Noest';});
    var cmdesShow=filLiv==='Bilel'?cmdesBilel:filLiv==='Noest'?cmdesNoest:allCmdes;

    var livsAll=r2.livraisons||[];
    var livreesBilel=livsAll.filter(function(l){
      return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE')||l.statut.includes('LIVRÉ'));
    });
    var livreesNoest=(r3.livraisons||[]).filter(function(l){return l.statut&&l.statut.includes('Livré');});
    var retoursNoest=(r3.livraisons||[]).filter(function(l){return l.statut&&l.statut.includes('Retour');});

    // ── Grouper par client (même téléphone) ──
    function grouperParClient(liste){
      var map={}, ordre=[];
      liste.forEach(function(c){
        var key=String(c.tel||'').replace(/\s/g,'').replace(/^\+?213/,'0')||c.nom;
        if(!map[key]){
          map[key]={key:key,nom:c.nom,tel:c.tel,wilaya:c.wilaya,commune:c.commune||'',adresse:c.adresse||'',date:c.date,via:getTransp(c),numCmds:[],articles:[],total:0};
          ordre.push(key);
        }
        map[key].numCmds.push(c.numCmd);
        map[key].articles.push(c);
        map[key].total+=parseFloat(c.montant)||0;
      });
      return ordre.map(function(k){return map[k];});
    }

    var html=_resumeLivraisons(allCmdes)+'<div class="filter-row">';
    ['Toutes','Bilel','Noest'].forEach(function(f){
      html+='<button class="fbtn'+(f===filLiv?' on':'')+'" data-f="'+f+'" onclick="setNlFil(this)">'+f+'</button>';
    });
    html+='</div>';
    html+='<div class="filter-row">';
    ['Toutes','En attente','Livré'].forEach(function(f){
      html+='<button class="fbtn'+(f===filStat?' on':'')+'" data-s="'+f+'" onclick="setNlStat(this)">'+f+'</button>';
    });
    html+='</div>';

    // ── En attente — groupés ──
    if(filStat==='Toutes'||filStat==='En attente'){
      var groupes=grouperParClient(cmdesShow);
      html+='<div class="slt">⏳ En attente ('+groupes.length+' client'+(groupes.length>1?'s':'')+')</div>';
      if(!groupes.length) html+='<div class="empty">✅ Aucune en attente</div>';
      else groupes.forEach(function(g){
        var isBilel=(g.via==='Bilel');
        var isNoest=(g.via==='Noest');
        var tag=isBilel?'🚚 Bilel':'📦 Noest';
        var tagCol=isBilel?'#BA7517':'#185FA5';
        var multi=g.articles.length>1;
        // Produit label pour Noest : "Rochitta + Samara"
        var prodNoestLabel=g.articles.map(function(a){return a.produit||(a.variant||'');}).join(' + ');
        // Vérifier si déjà envoyé (clé = premier numCmd du groupe)
        var clePrincipale=g.numCmds[0];
        var dejaSent=_noestGetTracking(clePrincipale);

        html+='<div class="li lo"><div class="li-row"><div style="flex:1">'
          +'<div class="li-nm">'+h(g.nom)+_srcBadge(g.numCmds&&g.numCmds[0]||'')+'</div>';

        if(multi){
          g.articles.forEach(function(a){
            var dm=String(a.variant||a.produit||'').match(/(\d+cm)/i);
            html+='<div class="li-sb" style="color:#ddd">• '+h(a.produit)+(dm?' <span style="background:rgba(233,69,96,.2);color:var(--ac);padding:1px 5px;border-radius:4px;font-size:10px">'+dm[1]+'</span>':'')+' <span style="color:var(--gold)">'+fmt(a.montant)+' DA</span></div>';
          });
          html+='<div class="li-sb" style="color:var(--gold);font-weight:700">Total: '+fmt(g.total)+' DA COD</div>';
        } else {
          var dm0=String(g.articles[0].variant||g.articles[0].produit||'').match(/(\d+cm)/i);
          var pLbl=dm0?h(g.articles[0].produit)+' <span style="background:rgba(233,69,96,.2);color:var(--ac);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700">'+dm0[1]+'</span>':h(g.articles[0].produit);
          html+='<div class="li-sb">'+pLbl+'</div>'
            +'<div class="li-sb" style="color:var(--gold)">'+fmt(g.total)+' DA</div>';
        }

        html+='<div class="li-sb" style="color:#aaa">📍 '+h(g.wilaya)+' · 📅 '+h(g.date||'—')+'</div>'
          +'</div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'
          +'<span style="font-size:10px;font-weight:700;color:'+tagCol+';background:'+tagCol+'20;padding:2px 7px;border-radius:4px">'+tag+(multi?' ('+g.articles.length+')':'')+'</span>';

        if(isNoest){
          if(dejaSent){
            // Déjà envoyé — afficher tracking + bouton modifier
            html+='<span style="font-size:9px;color:#4FC3F7;font-weight:700;background:rgba(79,195,247,.1);padding:2px 6px;border-radius:4px">📡 '+h(dejaSent)+'</span>';
            html+='<button class="btn-sm" style="background:#444;font-size:10px" onclick="_modifNoest(\''+h(dejaSent)+'\',\''+h(g.nom)+'\',\''+h(g.tel)+'\',\''+h(g.wilaya)+'\','+g.total+')">✏️ Modifier</button>';
          } else {
            // Pas encore envoyé — UN SEUL bouton pour tout le groupe
            html+='<button class="btn-sm" style="background:#185FA5" onclick="_envNoest(this,\''+h(clePrincipale)+'\',\''+h(g.nom)+'\',\''+h(g.tel)+'\',\''+h(g.wilaya)+'\',\''+h(g.commune)+'\',\''+h(prodNoestLabel)+'\','+g.total+',\''+h(g.numCmds.join(','))+'\')">📦 Envoyer Noest</button>';
          }
        }

        // Bouton Livré par article
        g.articles.forEach(function(a){
          html+='<button class="btn-sm" style="background:#0a3d6b;font-size:10px" onclick="ouvrirLivNoest(\''+h(a.numCmd)+'\',\''+h(a.nom)+'\')">✓ Livré</button>';
        });

        html+='</div></div></div>';
      });
    }

    // ── Livrées ──
    if(filStat==='Toutes'||filStat==='Livré'){
      var showBilel=(filLiv==='Toutes'||filLiv==='Bilel');
      var showNoest=(filLiv==='Toutes'||filLiv==='Noest');
      var totalLivrees=(showBilel?livreesBilel.length:0)+(showNoest?livreesNoest.length:0);
      html+='<div class="slt">✅ Livrées ('+totalLivrees+')</div>';
      if(!totalLivrees) html+='<div class="empty">Aucune livraison effectuée</div>';
      else {
        if(showBilel) livreesBilel.slice().reverse().slice(0,15).forEach(function(l){
          html+='<div class="li lg"><div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(l.nom||'Client')+'</div>'
            +'<div class="li-sb">📍 '+h(l.wilaya||'')+' · 📅 '+h(l.date||'')+'</div>'
            +'</div><div style="text-align:right">'
            +'<span style="font-size:10px;font-weight:700;color:#BA7517;background:#BA751720;padding:2px 6px;border-radius:4px">🚚 Bilel</span>'
            +'<div style="font-size:11px;color:#888;margin-top:3px">'+fmt(l.aRemettre||0)+' DA</div>'
            +'</div></div></div>';
        });
        if(showNoest) livreesNoest.concat(retoursNoest).forEach(function(l){
          var livr=l.statut&&l.statut.includes('Livré');
          html+='<div class="li '+(livr?'lg':'lo')+'"><div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(l.nom)+'</div>'
            +'<div class="li-sb">'+h(l.produit)+' · 📍 '+h(l.wilaya||'')+'</div>'
            +'</div><div style="text-align:right">'
            +'<span style="font-size:10px;font-weight:700;color:#185FA5;background:#185FA520;padding:2px 6px;border-radius:4px">📦 Noest</span>'
            +'<div class="bdg '+(livr?'bg':'bo')+'" style="margin-top:4px">'+h(l.statut)+'</div>'
            +'</div></div></div>';
        });
      }
    }

    div.innerHTML=html;
    div._allCmdes=allCmdes;
  });
}
// ── ONGLET 📡 Noest — suivi complet ──────────────────────────────────
function rNesNoest(div){
  div.innerHTML='<div class="slt">📡 Suivi Noest</div>'+_skelHtml(6);
  getAPI('suivi_noest',function(r){
    var tous=r.commandes||[];

    // Source de vérité = Sheets (col V tracking, col P situation, col X statut)
    var todo=[], enCours=[], livrees=[], retours=[];
    tous.forEach(function(g){
      var sit=String(g.situation_final||'').toLowerCase();
      var trk=String(g.tracking||'').trim();
      var sx=String(g.statut_noest||g.tracking_statut||'').toLowerCase();
      if(sit.includes('livr')||sx==='livré'||sx==='livre'){
        livrees.push(g);
      } else if(sit.includes('retour')||sx==='retour'){
        retours.push(g);
      } else if(!trk){
        todo.push(g);
      } else {
        enCours.push(g);
      }
    });

    function statutBadge(s){
      var sl=String(s||'').toLowerCase();
      var col=sl.includes('livr')?'var(--g)':sl.includes('livraison')||sl.includes('fdr')?'#4FC3F7':sl.includes('ramass')||sl.includes('enlev')?'#F39C12':sl.includes('retour')?'var(--o)':'#888';

function _selTousNoest(btn){
  var chks=document.querySelectorAll('.noest-chk');
  var tousCoches=Array.from(chks).every(function(c){return c.checked;});
  chks.forEach(function(c){c.checked=!tousCoches;});

  _majBtnEtiquettes();
}
function _majBtnEtiquettes(){
  var chks=document.querySelectorAll('.noest-chk:checked');
  var zone=document.getElementById('btn_etiq_zone');
  var nb=document.getElementById('nb_etiq');
  if(!zone) return;
  if(chks.length>0){zone.style.display='block';if(nb)nb.textContent=chks.length;}
  else zone.style.display='none';
}
function _genererEtiquettes(){
  var chks=Array.from(document.querySelectorAll('.noest-chk:checked'));
  if(!chks.length) return;
  var trackings=chks.map(function(c){return c.dataset.tracking;}).filter(Boolean);
  var noms=chks.map(function(c){return c.dataset.nom||'';});
  var btn=document.getElementById('btn_etiq');
  if(btn){btn.textContent='⏳ Génération en cours...';btn.disabled=true;}
  send({source:'GENERER_ETIQUETTES',trackings:trackings},function(r){
    if(btn){btn.textContent='🖨️ Générer étiquettes ('+trackings.length+')';btn.disabled=false;}
    if(!r||!r.liens||!r.liens.length){
      showSuc('⚠️','Erreur',(r&&r.error)||'Impossible de générer les étiquettes',[]);
      return;
    }
    var acts=r.liens.map(function(l,i){
      return {lbl:'🏷️ '+(noms[i]||('Étiquette '+(i+1))),href:l.url,bg:'#185FA5'};
    });
    // Ouvrir chaque PDF dans un onglet
    r.liens.forEach(function(l){window.open(l.url,'_blank');});
    showSuc('✅',r.liens.length+' étiquette(s) générée(s)','PDF ouverts dans de nouveaux onglets',acts);
  });
}

function _envNoestMasse(){
  getAPI('suivi_noest',function(r){
    var todo=(r.commandes||[]).filter(function(c){return !c.tracking_noest;});
    if(!todo.length){showSuc('📦','Tout est envoyé','Aucune commande en attente',[]);return;}
    if(!confirm('📦 Envoyer '+todo.length+' commande(s) à Noest ?')) return;
    var ok=0,ko=0;
    function next(i){
      if(i>=todo.length){
        invalidateCache(['commandes_bilel','suivi_noest','livraisons_noest']);
        showSuc('✅',ok+' envoyée(s) !',ko?' ('+ko+' erreur(s))':'',[]);
        setTimeout(function(){var tc=document.querySelector('.tc');if(tc)rNesNoest(tc);},800);
        return;
      }
      var c=todo[i];
      send({source:'ENVOYER_NOEST',numCmd:c.numCmd,allNumCmds:c.numCmd,nom:c.nom,tel:c.tel,wilaya:c.wilaya,commune:c.commune||'',produit:c.produit,montant:c.montant},function(r){
        if(r&&r.tracking){_noestSaveTracking(c.numCmd,r.tracking);ok++;}else ko++;
        setTimeout(function(){next(i+1);},350);
      });
    }
    next(0);
  });
}

// ── Normalisation téléphone (côté app) ───────────────────────────────
// Entrée: +0660212121 | 0660212121 | 213660212121 | +213660212121
// Sortie: 0660212121 (format Noest) ou +213660212121 (format Shopify)
// ── Badge source commande selon le numéro order ───────────────────────
// FB_IA0024 → 🤖 IA | WA163055 → 📱 WA | #3363 → 🛒 Shop
function _srcBadge(numCmd){
  var n=String(numCmd||'');
  if(n.startsWith('FB_')||n.startsWith('fb_'))
    return '<span style="font-size:9px;background:#6C3483;color:#fff;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px">🤖 IA</span>';
  if(n.startsWith('WA')||n.startsWith('wa'))
    return '<span style="font-size:9px;background:#BA7517;color:#fff;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px">📱 WA</span>';
  return '<span style="font-size:9px;background:#185FA5;color:#fff;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px">🛒 Shop</span>';
}

function _normTelNoest(tel){
  // Supprimer espaces et caractères non numériques sauf +
  var t=String(tel||'').trim().replace(/\s+/g,'');
  // Supprimer le + initial si suivi d'un 0 (+0660... → 0660...)
  if(t.startsWith('+0')) t=t.slice(1);
  // Supprimer le + si suivi de 213 (+213... → 213...)
  if(t.startsWith('+')) t=t.slice(1);
  // 213XXXXXXXXX → 0XXXXXXXXX
  if(t.startsWith('213')&&t.length>=12) t='0'+t.slice(3);
  // Déjà 0XXXXXXXXX
  if(t.startsWith('0')&&t.length===10) return t;
  // 9 chiffres sans 0
  if(t.length===9) return '0'+t;
  return t;
}
function _normTelSheets(tel){
  var t=_normTelNoest(tel);
  return t.startsWith('0')?'+213'+t.slice(1):t;
}

// ── NOEST : anti-doublon localStorage ────────────────────────────────
// ── RÉSUMÉ PRODUITS EN COURS — bandeau affiché en haut de chaque onglet livraisons ──
function _resumeLivraisons(cmdes){
  // cmdes = liste des commandes EN ATTENTE (non livrées)
  if(!cmdes||!cmdes.length) return '';

  // Compter par produit normalisé
  var compteur={}, ordre=[];
  cmdes.forEach(function(c){
    // Normaliser le nom : utiliser variant si contient dimension, sinon produit
    var v=String(c.variant||'').trim();
    var p=String(c.produit||'').trim();
    var dim=v.match(/(\d+cm)/i)||p.match(/(\d+cm)/i);
    var nom;
    if(p.toLowerCase().includes('rosa')||p.toLowerCase().includes('electr')||p.toLowerCase().includes('élect')){
      nom=dim?'ROSA '+dim[1]:'ROSA';
    } else if(p.toLowerCase().includes('bio')||p.toLowerCase().includes('bruleur')||p.toLowerCase().includes('brûleur')){
      nom=dim?'Brûleur '+dim[1]:'Brûleur bio';
    } else {
      nom=v||p;
    }
    if(!nom) return;
    if(!compteur[nom]){compteur[nom]=0; ordre.push(nom);}
    compteur[nom]+=(parseInt(c.qte)||1);
  });

  if(!ordre.length) return '';

  // Générer le bandeau — chips colorés
  var chips=ordre.map(function(nom){
    var n=compteur[nom];
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:#1A1A2E;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:11px;white-space:nowrap">'
      +'<span style="font-weight:700;color:#fff">'+h(nom)+'</span>'
      +'<span style="background:var(--ac);color:#fff;border-radius:12px;padding:1px 7px;font-size:10px;font-weight:800">'+n+'</span>'
      +'</span>';
  }).join('');

  return '<div style="margin-bottom:10px">'
    +'<div style="font-size:10px;color:#888;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">📦 En cours de livraison</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div>'
    +'</div>';
}

function _envNoest(btn,clePrincipale,nom,tel,wilaya,commune,produitLabel,montant,allNumCmds){

  send({
    source:'ENVOYER_NOEST',
    numCmd:clePrincipale,         // numéro principal = référence Noest
    allNumCmds:allNumCmds,        // tous les numCmd du groupe → Sheets col V sur chaque ligne
    nom:nom, tel:tel, wilaya:wilaya, commune:commune,
    produit:produitLabel,         // "Rochitta + Samara"
    montant:montant               // total
  },function(r){
    if(r&&r.tracking){

      btn.disabled=false;
      btn.textContent='📡 '+r.tracking;
      btn.style.background='#1565C0';
      btn.style.fontSize='9px';

      showSuc('✅','Envoyé à Noest !',nom+' — '+r.tracking,[]);

      setTimeout(function(){var tc=document.querySelector('.tc');if(tc)rNesBilel(tc);},800);

      btn.disabled=false; btn.textContent='📦 Envoyer Noest'; btn.style.background='#185FA5';
      showSuc('⚠️','Erreur Noest',(r&&r.error)||'Erreur',[]);
    }
  });
}

function rNesZahra(div){
  div.innerHTML='<div class="empty">Chargement...</div>';
  // Lire les deux sources en parallèle
  getAPI('journee_zahra',function(rj){
    var journees=rj.journees||[];
    var tday=today();
    getAPI('confirmations',function(rc){
      var conf=(rc.confirmations||[]).filter(function(c){return c.confirmedBy==='Aicha';});
      // Grouper les confirmations par date
      var confByDate={};
      conf.forEach(function(c){
        var d=c.date||'?';
        if(!confByDate[d])confByDate[d]=[];
        confByDate[d].push(c);
      });

      var html='<div class="slt">Activité Zahra</div>';

      if(!journees.length && !conf.length){
        html+='<div class="empty">Aucune activité enregistrée</div>';
        div.innerHTML=html; return;
      }

      // Toutes les dates présentes
      var allDates=Array.from(new Set(
        journees.map(function(j){return j.date;}).concat(Object.keys(confByDate))
      )).sort().reverse();

      allDates.slice(0,20).forEach(function(d){
        var isToday=(d===tday);
        html+='<div class="card" style="margin-bottom:10px;'+(isToday?'border-color:rgba(233,69,96,.3)':'')+'">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
          +'<div style="font-size:12px;font-weight:700;color:'+(isToday?'var(--ac)':'#aaa')+'">📅 '+h(d)+'</div>'
          +(isToday?'<div class="bdg bg">Aujourd\'hui</div>':'')
          +'</div>';

        // Tâches de la journée
        var jour=journees.find(function(j){return j.date===d;});
        if(jour){
          var taches=jour.taches||{};
          Object.keys(taches).forEach(function(tid){
            var t=taches[tid];
            var ic=tid==='finition'?'✨':tid==='emballage'?'📦':tid==='bio'?'🔥':'🚐';
            var label=tid==='finition'?'Finition':tid==='emballage'?'Emballage':tid==='bio'?'Bioéthanol':'Ramassage Noest';
            html+='<div style="background:#0A0A14;border-radius:8px;padding:8px 10px;margin-bottom:6px">'

              t.prods.forEach(function(p){
                html+='<div style="font-size:11px;color:#888;margin-top:3px;padding-left:6px">→ '+h(p.prod)+' ×'+p.q+'</div>';
              });
            }
            html+='</div>';
          });
        }

        // Confirmations du jour
        var cDay=confByDate[d]||[];
        if(cDay.length){
          var cConf=cDay.filter(function(c){return String(c.etat||'').includes('CONFIRM');}).length;
          var cFaux=cDay.filter(function(c){return String(c.etat||'').toUpperCase().includes('FAUX')||String(c.etat||'').toUpperCase().includes('ANNUL');}).length;
          var cRapp=cDay.length-cConf-cFaux;
          html+='<div style="background:#0A0A14;border-radius:8px;padding:8px 10px;margin-bottom:6px">'
            +'<div style="font-size:12px;font-weight:600;margin-bottom:5px">📞 Confirmations ('+cDay.length+')</div>'
            +'<div style="display:flex;gap:10px">'
