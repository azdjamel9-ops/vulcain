<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Le Vulcain">
<title>Le Vulcain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F0F1A;color:#fff;min-height:100vh}
:root{--g:#27AE60;--r:#E24B4A;--o:#F39C12;--gold:#F1C40F;--card:#1A1A2E;--card2:#16213E;--brd:rgba(255,255,255,0.08);--ac:#E94560}
#lock{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:26px;font-weight:800;margin-top:10px}
.logo p{font-size:12px;color:#888;font-style:italic;margin-top:3px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.pb{background:#1A1A2E;border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer}
.pb:active{transform:scale(.94)}
.pb .ic{font-size:28px;margin-bottom:6px}
.pb .nm{font-size:14px;font-weight:700}
.pb .rl{font-size:10px;color:#888;margin-top:2px}
.pb[data-p="moh"]{border-color:rgba(29,158,117,.3)}
.pb[data-p="bilel"]{border-color:rgba(186,117,23,.3)}
.pb[data-p="zahra"]{border-color:rgba(216,90,48,.3)}
.pb[data-p="nesrine"]{border-color:rgba(108,52,131,.3)}
.pb[data-p="mehdi"]{grid-column:1/-1;border-color:rgba(24,95,165,.3)}
.pb.sel[data-p="moh"]{border-color:#1D9E75;background:rgba(29,158,117,.12)}
.pb.sel[data-p="bilel"]{border-color:#BA7517;background:rgba(186,117,23,.12)}
.pb.sel[data-p="zahra"]{border-color:#D85A30;background:rgba(216,90,48,.12)}
.pb.sel[data-p="nesrine"]{border-color:#6C3483;background:rgba(108,52,131,.12)}
.pb.sel[data-p="mehdi"]{border-color:#185FA5;background:rgba(24,95,165,.12)}
#pin-screen{display:none;position:fixed;inset:0;background:#0F0F1A;z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#pin-screen.show{display:flex}
.pin-title{font-size:18px;font-weight:700;margin-bottom:6px}
.pin-sub{font-size:12px;color:#888;margin-bottom:28px}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:background .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-dot.error{background:var(--r);border-color:var(--r)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.pin-btn{background:#1A1A2E;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px;font-size:22px;font-weight:700;cursor:pointer;text-align:center}
.pin-btn:active{background:#16213E;transform:scale(.95)}
#sa{display:none;flex-direction:column;height:100vh}
#sa.show{display:flex}
.hdr{background:#0F0F1A;padding:12px 16px 10px;border-bottom:1px solid var(--brd);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-nm{font-size:16px;font-weight:700}
.hdr-dt{font-size:10px;color:#888;margin-top:1px}
.hdr-bdg{font-size:11px;font-weight:700;padding:4px 10px;border-radius:16px;display:none}
.sw-btn{font-size:10px;background:rgba(255,255,255,.07);color:#aaa;border:none;padding:5px 9px;border-radius:8px;cursor:pointer}
.tabs{display:flex;background:#09090F;border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:52px;padding:11px 3px;text-align:center;font-size:10px;font-weight:600;color:#555;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tc{padding:14px 14px 50px}
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--brd)}
.ct{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kbox{background:var(--card2);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--brd)}
.kval{font-size:22px;font-weight:900;margin-bottom:2px}
.klbl{font-size:10px;color:#888;line-height:1.3}
.inp{width:100%;background:#0A0A14;border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;padding:12px 14px;font-size:14px;margin-bottom:8px;outline:none}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:#444}
select.inp{cursor:pointer}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{transform:scale(.97)}
.btn-a{background:var(--ac);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-gr{background:rgba(255,255,255,.08);color:#aaa}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:9px 13px;font-size:12px;border-radius:10px;border:none;font-weight:600;cursor:pointer;color:#fff}
.btn-sm:active{transform:scale(.93)}
.amt-inp{width:100%;background:#0A0A14;border:2px solid rgba(241,196,15,.3);border-radius:12px;color:var(--gold);padding:13px;font-size:22px;font-weight:800;text-align:center;outline:none;margin-bottom:8px}
.qa-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qa{background:rgba(241,196,15,.1);border:1px solid rgba(241,196,15,.2);border-radius:8px;color:var(--gold);padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer}
.opts{display:grid;gap:8px;margin-bottom:10px}
.opts.c2{grid-template-columns:1fr 1fr}
.opt{background:#0A0A14;border:2px solid rgba(255,255,255,.1);border-radius:12px;color:#888;padding:10px 6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.opt:active{transform:scale(.94)}
.opt.sg{border-color:var(--g);color:var(--g);background:rgba(39,174,96,.12)}
.opt.sr{border-color:var(--r);color:var(--r);background:rgba(226,75,74,.12)}
.opt.so{border-color:var(--o);color:var(--o);background:rgba(243,156,18,.12)}
.opt.sb{border-color:#378ADD;color:#378ADD;background:rgba(55,138,221,.12)}
.opt.sp{border-color:#6C3483;color:#6C3483;background:rgba(108,52,131,.12)}
.li{background:#0A0A14;border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid rgba(255,255,255,.1)}
.li.lg{border-left-color:var(--g)}
.li.lo{border-left-color:var(--o)}
.li.lr{border-left-color:var(--r)}
.li.lb{border-left-color:#378ADD}
.li-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.li-nm{font-size:13px;font-weight:600}
.li-sb{font-size:11px;color:#888;margin-top:3px;line-height:1.4}
.bdg{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;white-space:nowrap;flex-shrink:0}
.bg{background:rgba(39,174,96,.2);color:var(--g)}
.bo{background:rgba(243,156,18,.2);color:var(--o)}
.br{background:rgba(226,75,74,.2);color:var(--r)}
.bb{background:rgba(55,138,221,.2);color:#378ADD}
.qrow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qb{width:46px;height:46px;border-radius:11px;border:none;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qb.m{background:rgba(226,75,74,.2);color:var(--r)}
.qb.p{background:rgba(39,174,96,.2);color:var(--g)}
.qb:active{transform:scale(.88)}
.qdisp{flex:1;background:#0A0A14;border:2px solid rgba(255,255,255,.1);border-radius:11px;font-size:26px;font-weight:800;text-align:center;padding:9px;color:#fff}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.dc{background:#0A0A14;border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;position:relative}
.dc:active{transform:scale(.93)}
.dc.sel{border-color:var(--ac);background:rgba(233,69,96,.1)}
.dc-lbl{font-size:14px;font-weight:700}
.dc-pr{font-size:10px;color:#888;margin-top:2px}
.si{background:#0A0A14;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--brd)}
.si:active{transform:scale(.98)}
.si-ic{font-size:26px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:10px;flex-shrink:0}
.si-nm{font-size:13px;font-weight:600}
.si-sb{font-size:11px;color:#888;margin-top:2px}
.si-bd{font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;flex-shrink:0}
.sok{background:rgba(39,174,96,.15);color:var(--g)}
.slow{background:rgba(243,156,18,.15);color:var(--o)}
.salt{background:rgba(226,75,74,.15);color:var(--r)}
.ti{background:#0A0A14;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid rgba(255,255,255,.07)}
.ti.ck{border-color:var(--g);background:rgba(39,174,96,.07)}
.ti:active{transform:scale(.97)}
.ti-chk{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.ti.ck .ti-chk{background:var(--g);border-color:var(--g)}
.ti-nm{font-size:13px;font-weight:600;flex:1}
.tq{display:flex;align-items:center;gap:6px}
.tqb{width:28px;height:28px;border-radius:7px;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.tqb.m{background:rgba(226,75,74,.2);color:var(--r)}
.tqb.p{background:rgba(39,174,96,.2);color:var(--g)}
.tqv{font-size:14px;font-weight:700;min-width:22px;text-align:center}
.prog{height:5px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:14px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;transition:width .4s;background:var(--ac)}
.slt{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.empty{text-align:center;padding:28px 16px;color:#555;font-size:13px}
.alrt{background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.25);border-radius:10px;padding:9px 12px;font-size:11px;color:var(--r);margin-bottom:10px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center;padding:16px}
.ov.show{display:flex}
.modal{background:var(--card);border-radius:18px;padding:20px;width:100%;max-width:420px;border:1px solid var(--brd);max-height:80vh;overflow-y:auto}
.modal-t{font-size:16px;font-weight:700;margin-bottom:8px}
.modal-s{font-size:13px;color:#aaa;margin-bottom:14px;line-height:1.6}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.suc{display:none;position:fixed;inset:0;background:#0F0F1A;z-index:300;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;gap:14px}
.suc.show{display:flex}
.suc-ic{font-size:70px}
.suc-t{font-size:22px;font-weight:700}
.suc-s{font-size:13px;color:#aaa;line-height:1.6;max-width:280px}
.suc-acts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.suc-acts a{display:block;padding:14px;border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;text-align:center;color:#fff}
.ld{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:250;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.ld.show{display:flex}
.spin{width:46px;height:46px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-msg{font-size:13px;color:#888}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:6px 12px;background:rgba(255,255,255,.07);border:1px solid var(--brd);border-radius:20px;color:#888;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.fbtn.on{background:rgba(29,158,117,.2);border-color:var(--g);color:var(--g)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.cbtn{padding:12px;border-radius:12px;text-align:center;font-size:13px;font-weight:700;text-decoration:none;color:#fff;display:block}
.cbtn:active{transform:scale(.96)}

.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:skel-shimmer 1.2s infinite;border-radius:8px;}
@keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-li{height:64px;margin-bottom:8px;border-radius:12px;}
.skel-kpi{height:72px;border-radius:12px;flex:1;}
.skel-row{display:flex;gap:8px;margin-bottom:8px;}
</style>
</head>

function startPin(p){
  pendingP=p; pinBuf=''; updateDots();
  document.getElementById('pin-title').textContent='Bonjour '+p.charAt(0).toUpperCase()+p.slice(1)+' !';
  document.getElementById('pin-screen').classList.add('show');
}
function pp(v){
  if(v==='del'){pinBuf=pinBuf.slice(0,-1);updateDots();return;}
  if(pinBuf.length>=4) return;
  pinBuf+=v; updateDots();
  if(pinBuf.length===4) setTimeout(checkPin,100);
}
function updateDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    d.className='pin-dot'+(i<pinBuf.length?' filled':'');
  }
}
function checkPin(){
  if(pinBuf===PINS[pendingP]){
    document.getElementById('pin-screen').classList.remove('show');
    P=pendingP; localStorage.setItem('vp',P); launch();
  } else {
    for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot error';
    pinBuf='';
    setTimeout(function(){for(var i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot';},600);
  }
}

// Cache en mémoire — évite les refetch inutiles
var _apiCache = {};
var _API_TTL = {
  'dashboard':             45,
  'commandes_bilel':       30,
  'commandes_confirmation':30,
  'confirmations':         30,
  'livraisons_bilel':      45,
  'livraisons_noest':      45,
  'production_moh':         45,
  'stats_moh':              45,
  'journee_zahra':         60,
  'stock_elec':             60,
  'stock_intrants':         60,
  'campagnes_meta':         90,
  'stock_zahra':            60,
  'stock_nesrine':          60,
  'liste_achats':          120,
  'depenses_bilel':        90,
  'suivi_noest':           120,
};

function getAPI(action, cb, force){
  var ttl = (_API_TTL[action]||30) * 1000;
  var now = Date.now();
  var cached = _apiCache[action];
  // Retourner le cache si valide et pas de force
  if (!force && cached && (now - cached.ts) < ttl) {
    // Cache hit → synchrone, pas de spinner
    cb(cached.data);
    return;
  }
  showLd();
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort();},6000);
  fetch(SU+'?action='+action,{signal:ctrl.signal,redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(r){
      clearTimeout(tid);
      hideLd();
      _apiCache[action] = {data: r, ts: Date.now()};
      cb(r);
    })
    .catch(function(e){
      clearTimeout(tid);
      hideLd();
      if (cached) { cb(cached.data); return; }
      cb({});
    });
}

// Invalider le cache après une écriture (send)
function invalidateCache(actions){
  (actions||[]).forEach(function(a){ delete _apiCache[a]; });
}

// Charger plusieurs endpoints en parallèle, callback quand tous sont prêts
function getAPIs(actions, cb){
  var results = {}, done = 0;
  showLd();
  actions.forEach(function(action){
    fetch(SU+'?action='+action)
      .then(function(r){return r.json();})
      .then(function(r){
        _apiCache[action] = {data: r, ts: Date.now()};
        results[action] = r;
        done++;
        if(done === actions.length){ hideLd(); cb(results); }
      })
      .catch(function(e){
        results[action] = _apiCache[action]?_apiCache[action].data:{};
        done++;
        if(done === actions.length){ hideLd(); cb(results); }
      });
  });
}

  var _INV_MAP = {

    'ZAHRA_CONFIRMATION': ['commandes_confirmation','confirmations'],
    'ZAHRA_JOURNEE':      ['journee_zahra','stock_zahra','stock_nesrine'],
    'MOH_PRODUCTION':     ['production_moh','stats_moh','stock_elec','stock_intrants'],
    'MOH_STOCK_ELEC':     ['stock_elec'],
    'NESRINE_COMMANDE':   ['commandes_bilel','commandes_confirmation','dashboard'],
    'ENVOYER_NOEST':      ['commandes_bilel','suivi_noest','livraisons_noest'],
    'MODIFIER_NOEST':     ['suivi_noest'],
    'GENERER_ETIQUETTES': [],
    'UPDATE_COMMANDE':    ['commandes_bilel','commandes_confirmation','confirmations'],
    'DEPOT_BILEL':        ['livraisons_bilel'],
    'UPDATE_STOCK_PF':    ['stock_zahra','stock_nesrine','stock_elec'],
    'UPDATE_INVENTAIRE':  ['stock_intrants'],
    'PAIEMENT_MOH':       ['stats_moh','production_moh'],
    'MOH_STOCK':           ['stock_intrants'],
  };
  if(data.source && _INV_MAP[data.source]) invalidateCache(_INV_MAP[data.source]);
  showLd('Envoi...');
  var ctrl2=new AbortController();
  var tid2=setTimeout(function(){ctrl2.abort();},15000); // 18s pour mobile 3G

  // Compresser le payload si besoin (retirer les champs inutiles)
  var payload=data;
  if(data.source==='MOH_PRODUCTION'&&data.productions){
    // Garder seulement les champs essentiels
    payload={
      source:'MOH_PRODUCTION',
      productions:data.productions.map(function(p){return{dim:p.dim,qty:p.qty||p.qte||1,d:p.d||p.date||''};})
    };
  }
  var encoded=encodeURIComponent(JSON.stringify(payload));
  var url=SU+'?data='+encoded;

  fetch(url,{signal:ctrl2.signal,redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(r){clearTimeout(tid2);hideLd();if(cb)cb(r);})
    .catch(function(e){
      clearTimeout(tid2);
      hideLd();
      console.error('send error ('+data.source+')',e.message||e);
      var q=JSON.parse(localStorage.getItem('vq')||'[]');
      q.push({data:data,ts:Date.now()});
      localStorage.setItem('vq',JSON.stringify(q));
      if(cb)cb({success:false,queued:true});
    });
}

function today(){return new Date().toLocaleDateString('fr-FR');}
// Normaliser une date Sheets (peut être ISO, anglais, ou fr) → dd/mm/yyyy
function normDate(d){
  if(!d) return '';
  var s=String(d).trim();
  // Format déjà dd/mm/yyyy ou d/m/yyyy → normaliser les zéros
  var mfr=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(mfr) return mfr[1].padStart(2,'0')+'/'+mfr[2].padStart(2,'0')+'/'+mfr[3];
  // ISO "2026-04-08..." → dd/mm/yyyy
  var miso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(miso) return miso[3]+'/'+miso[2]+'/'+miso[1];
  // Tout autre format (anglais, etc.) → parser via Date
  if(s.length>8){
    var dt=new Date(s);
    if(!isNaN(dt.getTime())){
      var dd=String(dt.getDate()).padStart(2,'0');
      var mm=String(dt.getMonth()+1).padStart(2,'0');
      var yyyy=dt.getFullYear();
      return dd+'/'+mm+'/'+yyyy;
    }
  }
  return s;
}
// Convertir date normalisée fr (dd/mm/yyyy) en timestamp pour tri
function dateToMs(d){
  var s=normDate(d);
  if(!s) return 0;
  var p=s.split('/');
  if(p.length===3) return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])).getTime();
  return 0;
}
function now(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function isElec(p){return String(p||'').toLowerCase().replace(/[^a-z]/g,'').indexOf('rosa')>=0||String(p||'').toLowerCase().indexOf('lect')>=0;}
// Produits qui vont automatiquement vers Bilel (pas de choix transporteur)
// = Cheminées électriques ROSA + Razania + La Minusla
function isBilelAuto(p){
  var pl=String(p||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return pl.includes('rosa')
    || pl.includes('lect')   // électrique
    || pl.includes('razania')
    || pl.includes('minusla');
}

// ── HISTORIQUE PRODUCTION MOH ─────────────────────────────────────────
function rMohHistorique(div){
  div.innerHTML='<div class="slt">📋 Historique production</div>'+_skelHtml(8);
  getAPI('production_moh',function(r){
    var prods=r.productions||[];
    var tday=today();

    // Exclure aujourd'hui (affiché dans l'onglet Prod)
    var hist=prods.filter(function(p){ return normDate(p.date)!==tday; });

    if(!hist.length){
      div.innerHTML='<div class="slt">📋 Historique production</div><div class="empty">Aucun historique disponible</div>';
      return;
    }

    // Grouper par date normalisée — tri par dateToMs décroissant
    var byDate={};
    hist.forEach(function(p){
      var d=normDate(p.date); // toujours dd/mm/yyyy
      if(!d) return;
      if(!byDate[d]){byDate[d]={date:d,ms:dateToMs(d),items:[],total:0,gain:0,paye:0};}
      var dimM=String(p.produit||'').match(/(\d+cm)/i);
      var dim=dimM?dimM[1]:'';
      var sal=salMoh(dim);
      byDate[d].items.push({...p,dim:dim,sal:sal,gainItem:p.qte*sal});
      byDate[d].total+=p.qte;
      byDate[d].gain+=p.qte*sal;
      if(p.paye) byDate[d].paye+=p.qte*sal;
    });

    // Trier par date décroissante (plus récent en premier) via ms
    var dates=Object.keys(byDate).sort(function(a,b){return byDate[b].ms-byDate[a].ms;});

    // KPIs globaux
    var totalQte=hist.reduce(function(s,p){return s+(p.qte||1);},0);
    var totalGain=Object.values(byDate).reduce(function(s,d){return s+d.gain;},0);
    var totalPaye=Object.values(byDate).reduce(function(s,d){return s+d.paye;},0);

    var html='<div class="kpi2" style="margin-bottom:12px">'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+totalQte+'</div><div class="klbl">Total produit</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--g)">'+fmt(totalGain)+'</div><div class="klbl">DA total</div></div>'
      +'<div class="kbox"><div class="kval" style="color:#4FC3F7">'+fmt(totalPaye)+'</div><div class="klbl">DA payé</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--o)">'+fmt(totalGain-totalPaye)+'</div><div class="klbl">DA restant</div></div>'
      +'</div>';

    dates.forEach(function(d){
      var day=byDate[d];
      html+='<div class="card" style="padding:10px 12px;margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
          +'<div style="font-size:13px;font-weight:700;color:#ddd">📅 '+h(d)+'</div>'
          +'<div style="text-align:right">'
            +'<div style="font-size:13px;font-weight:800;color:var(--gold)">'+day.total+' pcs · '+fmt(day.gain)+' DA</div>'
            +(day.paye>0?'<div style="font-size:10px;color:var(--g)">✓ '+fmt(day.paye)+' DA payé</div>':'')
          +'</div>'
        +'</div>';
      day.items.forEach(function(p){
        var label=p.dim?'⚡ ROSA '+p.dim:h(p.produit);
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#0A0A14;border-radius:8px;margin-bottom:4px">'
          +'<div>'
            +'<span style="font-size:12px;color:#ccc">'+label+'</span>'
            +'<span style="font-size:10px;color:#666;margin-left:6px">'+fmt(p.sal)+' DA/u</span>'
          +'</div>'
          +'<div style="display:flex;align-items:center;gap:6px">'
            +'<span style="font-size:12px;font-weight:700;color:var(--gold)">×'+p.qte+' = '+fmt(p.gainItem)+' DA</span>'
            +(p.paye?'<span style="font-size:10px;color:var(--g)">✓</span>':'')
            +(p.dim&&p.timestamp?'<button style="background:#333;border:none;color:#aaa;padding:2px 7px;border-radius:6px;font-size:10px;cursor:pointer" onclick="editProductionMoh(\''+h(p.timestamp)+'\','+p.qte+','+(p.salaire||0)+',\''+p.dim+'\')">✏️</button>':'')
          +'</div>'
        +'</div>';
      });
      html+='</div>';
    });

    div.innerHTML=html;
  });
}

function addPr(){

function envProd(){
  var local=JSON.parse(localStorage.getItem('vm_local_prod')||'[]');
  var tday=today();
  var td=local.filter(function(p){return p.d===tday&&!p.sent;});
  if(!td.length){alert('Ajoute une production d\'abord !');return;}
  var tot=td.reduce(function(s,p){return s+p.qty;},0);
  var gain=td.reduce(function(s,p){return s+(p.qty||p.qte||1)*salMoh(p.dim);},0);
  send({source:'MOH_PRODUCTION',productions:td,totalQte:tot,totalSalaire:gain},function(r){
    if(r.success){
      // Marquer comme envoyé
      local.forEach(function(p){if(p.d===tday&&!p.sent)p.sent=true;});
      localStorage.setItem('vm_local_prod',JSON.stringify(local));
      var sol=r.soldeMoh||0;
      var msg='Production Moh - '+tday+'\n\n'+td.map(function(p){return p.qty+'x Chim.elec. '+p.dim;}).join('\n')+'\n\nSalaire: '+fmt(gain)+' DA\nSolde: '+fmt(sol)+' DA';
      var parMois=r.parMois||{};
      var moisLines=Object.keys(parMois).map(function(m){return m+': '+fmt(parMois[m])+' DA';}).join(' | ');
      showSuc('✅','Enregistré !',tot+' cheminee(s) — '+fmt(gain)+' DA'+(moisLines?'\n'+moisLines:''),[
        {lbl:'📱 Résumé Nesrine',href:waLink(WA.nesrine,msg),bg:'#1D9E75'}
      ]);
    } else {
      showSuc('⚠️','Erreur envoi','Les données seront envoyées à la prochaine connexion',[]);
    }
  });
}

// ── MOH COMMANDES (lecture seule - wilaya + produit sans nom ni prix) ──
function rMohCmdes(div){
  div.innerHTML='<div class="slt">Cheminees a produire</div>'+_skelHtml(5);
  getAPIs(['commandes_bilel','stock_intrants'],function(_d){
    var rCmdes=_d['commandes_bilel']||{};
    var intrants=(_d['stock_intrants']||{}).intrants||[];

    function stockActuel(id){var f=intrants.find(function(i){return i.id===id;});return f?(f.actuel||0):999;}
    function stockMin(id){var f=intrants.find(function(i){return i.id===id;});return f?(f.min||0):0;}

    // Filtrer : cheminées élec, non livrées, non faux/annulé
    var cmdes=(rCmdes.commandes||[]).filter(function(c){
      var e=String(c.etat||c.statut||'').toUpperCase().trim();
      var sit=String(c.situation||'').toLowerCase();
      var p=String(c.produit||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if(e.includes('FAUX')||e.includes('ANNUL')) return false;
      if(sit.includes('livr')||sit.includes('retour')) return false;
      return p.includes('rosa')||p.includes('electr')||p.includes('chim')||p.includes('elect');
    });

    // Enrichir avec dimension + priorité
    cmdes=cmdes.map(function(c){
      var dimMatch=String(c.variant||c.produit||'').match(/(\d+cm)/i);
      var dim=dimMatch?dimMatch[1]:'';
      var dimNum=dim.replace('cm','');
      var act=dim?stockActuel('caisson_'+dimNum):999;
      var min=dim?stockMin('caisson_'+dimNum):0;
      var etatUp=String(c.etat||'').toUpperCase();
      var isConf=etatUp.includes('CONFIRM');
      var prio=dim&&act===0?1:dim&&act<=min?2:isConf?3:4;
      return Object.assign({},c,{dim:dim,act:act,min:min,prio:prio});
    });

    cmdes.sort(function(a,b){return a.prio!==b.prio?a.prio-b.prio:0;});

    if(!cmdes.length){div.innerHTML='<div class="empty">Aucune cheminee a produire</div>';return;}

    // ══════════════════════════════════════════════
    // PARTIE 1 — RÉSUMÉ PAR DIMENSION (grandes cartes)
    // ══════════════════════════════════════════════
    var dims={};
    var DIMS_ORDER=['80cm','100cm','120cm','140cm','160cm','200cm'];
    cmdes.forEach(function(c){
      var k=c.dim||'Autre';
      if(!dims[k]) dims[k]={dim:k,total:0,urgent:0,conf:0,attente:0,act:c.act,min:c.min,prio:4};
      dims[k].total++;
      dims[k].prio=Math.min(dims[k].prio,c.prio);
      if(c.prio===1||c.prio===2) dims[k].urgent++;
      if(String(c.etat||'').toUpperCase().includes('CONFIRM')) dims[k].conf++;
      else dims[k].attente++;
    });

    // Trier : urgences d'abord, puis par taille standard
    var dimList=Object.values(dims).sort(function(a,b){
      if(a.prio!==b.prio) return a.prio-b.prio;
      var ia=DIMS_ORDER.indexOf(a.dim), ib=DIMS_ORDER.indexOf(b.dim);
      if(ia<0) ia=99; if(ib<0) ib=99;
      return ia-ib;
    });

    var html='<div class="slt">Par dimension</div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';

    dimList.forEach(function(d){
      var col=d.prio===1?'#e74c3c':d.prio===2?'#e67e22':d.prio===3?'#27ae60':'#555';
      var bg =d.prio===1?'rgba(231,76,60,.12)':d.prio===2?'rgba(230,126,34,.1)':d.prio===3?'rgba(39,174,96,.08)':'rgba(30,30,50,.6)';
      var ico=d.prio===1?'🔴':d.prio===2?'🟠':d.prio===3?'✅':'⏳';
      var stockInfo=d.act<999?d.act+' en stock':'—';
      var urgLabel=d.urgent>0?('<div style="font-size:10px;font-weight:700;color:'+col+';margin-top:3px">'+ico+' '+d.urgent+' urgent'+(d.urgent>1?'s':'')+'</div>'):'';

      html+='<div style="background:'+bg+';border:2px solid '+col+';border-radius:14px;padding:12px 10px;text-align:center">'
        +'<div style="font-size:11px;color:#aaa;font-weight:600;margin-bottom:4px">ROSA</div>'
        +'<div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px">'+d.dim+'</div>'
        +'<div style="font-size:36px;font-weight:900;color:'+col+';line-height:1.1;margin:4px 0">'+d.total+'</div>'
        +'<div style="font-size:10px;color:#888">à produire</div>'
        +urgLabel
        +'<div style="font-size:10px;color:#666;margin-top:4px">stock: '+stockInfo+'</div>'
      +'</div>';
    });
    html+='</div>';

    // ══════════════════════════════════════════════
    // PARTIE 2 — LISTE DÉTAILLÉE
    // ══════════════════════════════════════════════
    html+='<div class="slt">Detail ('+cmdes.length+')</div>';
    cmdes.forEach(function(c){
      var prodLabel=c.dim?'⚡ ROSA '+c.dim:h(c.variant||c.produit);
      var borderCol,badgeTxt,badgeCls;
      if(c.prio===1){borderCol='rgba(231,76,60,.6)';badgeTxt='🔴 STOCK 0';badgeCls='br';}
      else if(c.prio===2){borderCol='rgba(243,156,18,.5)';badgeTxt='🟠 Stock bas';badgeCls='bo';}
      else if(c.prio===3){borderCol='rgba(39,174,96,.3)';badgeTxt='✅ Confirmée';badgeCls='bg';}
      else{borderCol='rgba(136,136,136,.2)';badgeTxt='⏳ En attente';badgeCls='';}

      html+='<div class="li" style="border-left:3px solid '+borderCol+'">'
        +'<div class="li-row">'
          +'<div style="flex:1">'
            +'<div class="li-nm">'+prodLabel+'</div>'
            +'<div class="li-sb">📍 '+h(c.wilaya||'—')+' · 📅 '+h(c.date||'—')+'</div>'
          +'</div>'
          +'<div class="bdg'+(badgeCls?' '+badgeCls:'')+'" style="white-space:nowrap;font-size:10px">'+badgeTxt+'</div>'
        +'</div>'
      +'</div>';
    });

    div.innerHTML=html;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// STOCK — FONCTION UNIQUE PAR RÔLE
// rôle 'rosa'  → Moh + Bilel  : ROSA uniquement, grille éditable (Moh) ou lecture (Bilel)
// rôle 'autre' → Zahra        : tous produits sauf ROSA, liste éditable
// rôle 'all'   → Nesrine      : tout dans une seule liste, éditable
// Toutes les fonctions ci-dessous utilisent UNE SEULE API call et UN SEUL div.innerHTML
// ═══════════════════════════════════════════════════════════════════════

// Fonction centrale de rendu stock
// action   : endpoint API à appeler
// div      : conteneur cible
// opts     : { grille: bool, editable: bool, titre: string, formatFn: fn }
function _renderStock(action, div, opts){
  // Skeleton si div vide
  if(!div.innerHTML || div.innerHTML===_skelHtml(5))
    div.innerHTML='<div class="slt">'+(opts.titre||'Stock')+'</div>'+_skelHtml(4);
  getAPI(action, function(r){
    var raw = r.stock || [];

    // Normaliser — deux formats possibles selon l'endpoint :
    // stock_elec   → {produit, variant, dim, dimension, actuel, min, statut, em}
    // stock_zahra / stock_nesrine → {nom, produit, variant, dim, actuel, min, statut, em, groupe}
    var st = raw.filter(function(s){ return s && (s.nom || s.variant || s.produit); }).map(function(s){
      // Construire un nom d'affichage court
      var dim = String(s.dim || s.dimension || '');
      var variant = String(s.variant || '');
      var produit = String(s.produit || '');
      // nom = champ nom si présent, sinon construire depuis produit + dim
      var nom = String(s.nom || '');
      if(!nom){
        if(dim && (produit.toLowerCase().includes('rosa') || produit.toLowerCase().includes('electr'))){
          nom = 'ROSA ' + dim;
        } else if(variant){
          nom = variant;
        } else {
          nom = produit;
        }
      }
      return {
        nom:     nom,
        variant: variant || nom,
        dim:     dim,
        actuel:  parseInt(s.actuel) || 0,
        min:     parseInt(s.min)    || 1,
        em:      String(s.em       || '📦'),
        statut:  String(s.statut   || ''),
        groupe:  String(s.groupe   || '')
      };
    });

    if(!st.length){
      div.innerHTML = '<div class="slt">'+(opts.titre||'Stock')+'</div>'
        +'<div class="empty">Aucun stock — première utilisation ou script à déployer</div>';
      return;
    }

    var html = (opts._prefix||'') + '<div class="slt">'+(opts.titre||'Stock')+'</div>';
    if(opts.editable) html += '<div style="font-size:11px;color:#888;margin-bottom:8px">Appuyez sur un article pour modifier</div>';

    if(opts.grille){
      // Affichage grille 2 colonnes (ROSA)
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">';
      st.forEach(function(s){
        var v=s.actuel, min=s.min;
        var col=v<=0?'var(--r)':v<=min?'var(--o)':'var(--g)';
        // Label court = dimension seule (80cm, 100cm…)
        var label = s.dim ? s.dim : s.nom;
        // data-variant = variant exact du catalogue pour le script
        var dv = h(s.variant||s.nom);
        var dn = h(s.nom);
        var dd = h(s.dim);
        if(opts.editable){
          html+='<div style="background:'+col+'18;border:1.5px solid '+col+'50;border-radius:12px;padding:12px;cursor:pointer;text-align:center"'
            +' data-nom="'+dn+'" data-variant="'+dv+'" data-dim="'+dd+'" data-val="'+v+'" data-min="'+min

// Popup édition stock universel (remplace editStockElec + editProdFini)
function editStockItem(el){
  var nom     = el.dataset.nom     || '';
  var variant = el.dataset.variant || nom;  // variant exact pour le script
  var val     = parseInt(el.dataset.val) || 0;
  var min     = parseInt(el.dataset.min) || 1;
  var em      = el.dataset.em  || '📦';
  var dim     = el.dataset.dim || '';
  // ROSA = variant contient "ROSA" ou dim est renseigné avec dimension cm
  var isRosa  = variant.toLowerCase().indexOf('rosa') >= 0 ||
                (nom.toLowerCase().indexOf('rosa') >= 0);
  // Titre = nom court pour l'affichage
  var titre   = dim ? (em + ' ROSA ' + dim) : (em + ' ' + nom);

  showOv(titre,
    '<div style="text-align:center;margin-bottom:12px">'
    +'<div style="font-size:11px;color:#888;margin-bottom:4px">'+h(variant)+'</div>'
    +'<div style="font-size:11px;color:#888">Actuel: <b style="color:#fff">'+val+'</b> · Min: <b style="color:var(--o)">'+min+'</b></div>'
    +'</div>'
    +'<div class="qrow" style="margin-bottom:6px">'
    +'<button class="qb m" onclick="var e=document.getElementById(&quot;esiq&quot;);e.textContent=Math.max(0,parseInt(e.textContent)-1)">−</button>'
    +'<div class="qdisp" id="esiq">'+val+'</div>'
    +'<button class="qb p" onclick="var e=document.getElementById(&quot;esiq&quot;);e.textContent=parseInt(e.textContent)+1">+</button>'
    +'</div>'
    +'<div class="qa-row" style="justify-content:center">'
    +[0,1,2,3,5,10,20,50].map(function(v){
      return '<button class="qa" onclick="document.getElementById(&quot;esiq&quot;).textContent='+v+'">'+v+'</button>';
    }).join('')
    +'</div>',
    function(){
      var nv = parseInt(document.getElementById('esiq').textContent) || 0;
      var payload;
      if(isRosa){
        // ROSA → MOH_STOCK_ELEC avec la dimension
        var dimVal = dim || variant.match(/(\d+cm)/i);
        dimVal = dim || (dimVal ? dimVal[1] : '');
        payload = {source:'MOH_STOCK_ELEC', dimension: dimVal, valeur: nv};
      } else {
        // Autres produits → UPDATE_STOCK_PF avec le variant exact
        payload = {source:'UPDATE_STOCK_PF', id: variant, nom: variant, variant: variant, valeur: nv};
      }
      send(payload, function(r){
        var ok = isRosa ? (r && r.success) : (r && r.updated);
        showSuc(ok ? '✅' : '⚠️',
                ok ? 'Stock mis à jour !' : 'Erreur',
                (dim ? 'ROSA '+dim : nom) + ' → ' + nv, []);
        setTimeout(function(){
          var tc = document.querySelector('.tc');
          if(tc && tc._stockAction){
            _renderStock(tc._stockAction, tc, tc._stockOpts);
          }
        }, 700);
      });
    }, 'Confirmer');
}

function _regionColor(r){
  return r==='Centre'?'#3498db':r==='Est'?'#e74c3c':r==='Ouest'?'#27ae60':'#e67e22';
}
function _regionEmoji(r){
  return r==='Centre'?'🔵':r==='Est'?'🔴':r==='Ouest'?'🟢':'🟠';

// Algorithme nearest-neighbor pour optimiser l'itinéraire
function _optimiserTournee(stops){
  if(!stops.length) return [];
  var reste=stops.slice();
  var route=[];
  var pos={lat:DEPART.lat,lng:DEPART.lng};

  while(reste.length){
    var best=null,bestDist=Infinity,bestIdx=0;
    reste.forEach(function(s,i){
      var d=Math.sqrt(Math.pow(s.lat-pos.lat,2)+Math.pow(s.lng-pos.lng,2));
      if(d<bestDist){bestDist=d;best=s;bestIdx=i;}
    });
    route.push(best);
    pos={lat:best.lat,lng:best.lng};
    reste.splice(bestIdx,1);
  }
  return route;
}

function _mapsUrl(stops){
  // Google Maps directions depuis Boumerdès avec waypoints optimisés
  var base='https://www.google.com/maps/dir/';
  var pts=[DEPART.lat+','+DEPART.lng];
  stops.forEach(function(s){ pts.push(encodeURIComponent(s.wilaya+', Algérie')); });
  pts.push(DEPART.lat+','+DEPART.lng); // retour
  return base+pts.join('/');
}

function planifierTournee(){
  // Charger stock + intrants en parallèle pour analyse disponibilité
  getAPIs(['commandes_bilel','stock_elec','stock_intrants'],function(_d){
    var enAtt=(_cmdes||[]).filter(function(c){
      var p=String(c.situation||'').toLowerCase();
      return !p.includes('livr')&&!p.includes('retour')&&!p.includes('annul');
    });

    if(!enAtt.length){alert('Aucune livraison en attente !');return;}

    var stockElec=(_d['stock_elec']||{}).stock||[];
    var intrants=(_d['stock_intrants']||{}).intrants||[];

    // Checker stock disponible par dimension
    function stockDim(dim){
      var s=stockElec.find(function(x){return x.dim===dim||x.dimension===dim;});
      return s?parseInt(s.actuel)||0:0;
    }
    function stockCaisson(dim){
      var id='caisson_'+dim.replace('cm','');
      var f=intrants.find(function(i){return i.id===id;});
      return f?parseInt(f.actuel)||0:999;
    }

    // Enrichir commandes avec geo + analyse stock
    var stops=enAtt.map(function(c){
      var geo=WILAYA_GEO[c.wilaya]||{lat:36.5,lng:3.0,region:'Centre',dist:100};
      var dimMatch=String(c.variant||c.produit||'').match(/(\d+cm)/i);
      var dim=dimMatch?dimMatch[1]:'';
      var stockChim=dim?stockDim(dim):0;
      var stockCais=dim?stockCaisson(dim):999;
      var peutLivrer=stockChim>0; // cheminée disponible en stock
      var mohDoitProduire=!peutLivrer&&stockCais>0; // matière ok mais cheminée pas prête
      // Date de commande pour priorité
      var dateRaw=String(c.date||'');
      var dateTs=0;
      if(dateRaw){var parts=dateRaw.split('/');if(parts.length===3)dateTs=new Date(parts[2],parts[1]-1,parts[0]).getTime();}
      var ageJours=dateTs?Math.floor((Date.now()-dateTs)/864e5):0;
      return Object.assign({},c,geo,{
        dim:dim,
        stockChim:stockChim,
        stockCais:stockCais,
        peutLivrer:peutLivrer,
        mohDoitProduire:mohDoitProduire,
        dateTs:dateTs,
        ageJours:ageJours,
      });
    });

    // Séparer : peut livrer vs attend production
    var peutLivrer=stops.filter(function(s){return s.peutLivrer;});
    var enAttenteProd=stops.filter(function(s){return !s.peutLivrer;});

    // Grouper par région — seulement les livraisons possibles
    var regions={};
    var REGION_ORDER=['Centre','Est','Ouest','Hauts Plateaux'];
    peutLivrer.forEach(function(s){
      var r=s.region||'Centre';
      if(!regions[r]) regions[r]=[];
      regions[r].push(s);
    });

    var html='';

    // ═══════ EN-TÊTE RÉSUMÉ ═══════
    var nbPossible=peutLivrer.length;
    var nbAttente=enAttenteProd.length;

    html+='<div style="background:rgba(30,30,50,.9);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;gap:8px">'
      +'<div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:900;color:#27ae60">'+nbPossible+'</div><div style="font-size:10px;color:#888">livrables</div></div>'
      +'<div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:900;color:#e74c3c">'+nbAttente+'</div><div style="font-size:10px;color:#888">attente stock</div></div>'
      +'<div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:900;color:#fff">'+stops.length+'</div><div style="font-size:10px;color:#888">total</div></div>'
    +'</div>';

    // ═══════ COMMANDES EN ATTENTE DE PRODUCTION ═══════
    if(enAttenteProd.length>0){
      html+='<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:12px;padding:10px 12px;margin-bottom:12px">'
        +'<div style="font-size:12px;font-weight:700;color:#e74c3c;margin-bottom:8px">🔴 '+enAttenteProd.length+' commande(s) — stock insuffisant</div>';

      // WA vers Moh pour urgence production
      var lignesMoh=enAttenteProd.map(function(s){
        return '[URGENT] ROSA '+s.dim+' pour '+s.wilaya+' ('+s.ageJours+'j)';
      }).join('\n');
      var msgMoh='Salam Moh !\n\nBilel a des livraisons bloquees, akhdem en urgence :\n\n'+lignesMoh+'\n\nMerci !\n- Le Vulcain';

      enAttenteProd.forEach(function(s){
        var age=s.ageJours;
        var ageCol=age>3?'#e74c3c':age>1?'#e67e22':'#888';
        html+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">'
          +'<span style="font-size:16px">⚡</span>'
          +'<div style="flex:1"><div style="font-size:11px;font-weight:700;color:#fff">ROSA '+s.dim+' — '+h(s.nom)+'</div>'
            +'<div style="font-size:10px;color:#888">'+h(s.wilaya)+' · stock: '+s.stockChim+' · <span style="color:'+ageCol+'">'+age+'j en attente</span></div>'
          +'</div>'
        +'</div>';
      });

      html+='<a href="'+waLink(WA.moh,msgMoh)+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;background:#e74c3c;color:#fff;text-decoration:none;padding:10px;border-radius:9px;font-weight:700;font-size:12px;margin-top:10px">'
        +'<span>📲</span>Demander urgence à Moh'
      +'</a>'
      +'</div>';
    }

    // ═══════ AUCUNE LIVRAISON POSSIBLE ═══════
    if(!nbPossible){
      html+='<div class="empty">Aucune livraison possible aujourd\'hui — stock insuffisant</div>';
      showOv('🗺️ Planification tournée', html, function(){}, 'Fermer');
      return;
    }

    // ═══════ TOURNÉES PAR RÉGION ═══════
    var recs=REGION_ORDER.filter(function(r){return regions[r]&&regions[r].length>0;});

    recs.forEach(function(r){
      var stops_r=regions[r];
      var col=_regionColor(r);
      var ico=_regionEmoji(r);

      // Distance max = wilaya la plus éloignée
      var distMax=Math.max.apply(null,stops_r.map(function(s){return s.dist||100;}));
      // Temps total = (trajet aller-retour) + (40min/client)
      var tempsTrajet=Math.round(distMax*2/80*60); // en minutes à 80km/h
      var tempsAttente=stops_r.length*40;           // 40 min par client
      var tempsTotal=tempsTrajet+tempsAttente;
      var heuresTotal=Math.floor(tempsTotal/60);
      var minsTotal=tempsTotal%60;

      // Heure de départ recommandée pour rentrer avant 20h
      var heureRetour=20*60; // 20h en minutes
      var departMinutes=heureRetour-tempsTotal;
      var departH=Math.floor(departMinutes/60);
      var departM=departMinutes%60;
      // Contrainte : min 4h du matin pour extreme
      if(departH<4) departH=4, departM=0;
      var departStr=String(departH).padStart(2,'0')+'h'+String(departM).padStart(2,'0');

      // Trier par ancienneté de commande (plus vieux = priorité)
      var optimized=_optimiserTournee(stops_r);
      // Appliquer priorité ancienneté sur ordre optimisé (tri stable secondaire)
      optimized.sort(function(a,b){
        // D'abord par cluster géo (déjà fait par nearest-neighbor)
        // Ensuite par ancienneté si même zone
        var distA=a.dist||0, distB=b.dist||0;
        if(Math.abs(distA-distB)<30 && a.ageJours!==b.ageJours) return b.ageJours-a.ageJours;
        return 0;
      });

      html+='<div style="background:rgba(30,30,50,.8);border:1.5px solid '+col+'40;border-left:4px solid '+col+';border-radius:12px;padding:12px;margin-bottom:10px">'

        // Header région
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
          +'<div style="font-size:13px;font-weight:700;color:'+col+'">'+ico+' Région '+r+'</div>'
          +'<div style="font-size:10px;color:#888">'+stops_r.length+' livr. · ~'+heuresTotal+'h'+minsTotal+'</div>'
        +'</div>'

        // Départ recommandé
        +'<div style="background:rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">'
          +'<span style="font-size:18px">⏰</span>'
          +'<div>'
            +'<div style="font-size:12px;font-weight:700;color:#fff">Départ recommandé : <span style="color:'+col+'">'+departStr+'</span></div>'
            +'<div style="font-size:10px;color:#888">Trajet: ~'+Math.round(tempsTrajet/60*10)/10+'h · Clients: '+stops_r.length+'×40min · Retour avant 20h</div>'
          +'</div>'
        +'</div>'

        // Itinéraire

function rBilelLiv(div){
  getAPI('commandes_bilel',function(r){
    var all=r.commandes||[];
    // Bilel voit UNIQUEMENT les commandes avec col U = "Bilel"
    // L'assignation se fait soit à la confirmation, soit à la création de commande
    _cmdes=all.filter(function(c){
      var sit=String(c.situation||'').toLowerCase();
      if(sit.includes('livr')||sit.includes('retour')||sit.includes('annul')) return false;
      return String(c.via||'').trim()==='Bilel';
    });
    var ws=['Toutes'];
    _cmdes.forEach(function(c){if(c.wilaya&&ws.indexOf(c.wilaya)<0)ws.push(c.wilaya);});
    var html='<button onclick="planifierTournee()" style="width:100%;padding:13px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px"><span style="font-size:18px">🗺️</span>Planifier ma tournée</button>';
    html+='<select class="inp" id="wfsel" onchange="wFil=this.value;renderBilelList()">';
    ws.forEach(function(w){html+='<option'+(w===wFil?' selected':'')+'>'+h(w)+'</option>';});
    html+='</select><div id="blist"></div>';
    div.innerHTML=html;
    renderBilelList();
  });

function renderBilelList(){
  // En attente = col P vide ou pas livré/retour/annulé
  // Livré = col P contient livré
  var _base=wFil==='Toutes'?_cmdes:_cmdes.filter(function(c){return c.wilaya===wFil;});
  var f=_base;
  var el=document.getElementById('blist');if(!el)return;
  // Séparer selon col P (situation)
  var enAtt=f.filter(function(c){
    var p=String(c.situation||'').toLowerCase();
    return !p.includes('livr')&&!p.includes('retour')&&!p.includes('annul');

  var html=_resumeLivraisons(enAtt)+'<div class="slt">⏳ En attente ('+enAtt.length+')</div>';
  if(!enAtt.length){html+='<div class="empty">✅ Aucune en attente</div>';}
  else{
    enAtt.forEach(function(c,idx){

        +'<div class="li-row"><div style="flex:1">'
        +'<div class="li-nm">'+h(c.nom)+_srcBadge(c.numCmd)+'</div>'
        +'<div class="li-sb">'+h(c.variant||c.produit)+'</div>'
        +'<div class="li-sb" style="color:#aaa">📍 '+h(c.wilaya)+' · 📅 '+h(c.date||'—')+'</div>'
        +'<div class="li-sb" style="color:var(--gold)">'+fmt(c.montant)+' DA COD</div>'
        +'</div><div style="text-align:right">'
        +'<div class="bdg bo">'+h(c.numCmd)+'</div>'
        +'<a href="tel:'+h(c.tel)+'" onclick="event.stopPropagation()" style="display:block;margin-top:6px;background:var(--g);color:#fff;padding:4px 9px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none">📞</a>'
        +'</div></div></div>';
    });
  }
  html+='<div class="slt">✅ Livré / Retour / Annulé ('+livrees.length+')</div>';
  if(!livrees.length){html+='<div class="empty">Aucune livraison traitée</div>';}
  else{
    livrees.forEach(function(c){
      var sit=String(c.situation||'').toUpperCase();
      var cls=sit.includes('LIVR')?'lg':sit.includes('RETOUR')?'lo':'lr';
      html+='<div class="li '+cls+'">'
        +'<div class="li-row"><div>'
        +'<div class="li-nm">'+h(c.nom)+_srcBadge(c.numCmd||'')+'</div>'
        +'<div class="li-sb">'+h(c.variant||c.produit)+'</div>'
        +'<div class="li-sb" style="color:#aaa">📍 '+h(c.wilaya)+' · 📅 '+h(c.date||'—')+'</div>'
        +'</div><div class="bdg '+(sit.includes('LIVR')?'bg':sit.includes('RETOUR')?'bo':'br')+'">'+h(c.situation||'')+'</div>'
        +'</div></div>';
    });
  }
  el.innerHTML=html;el._f=f;
}

// ── BILEL COMPTE ──
function rBilelCompte(div){
  getAPIs(['livraisons_bilel','depenses_bilel'],function(_bc){
    var r=_bc['livraisons_bilel']||{}, rd=_bc['depenses_bilel']||{};
    var livs=r.livraisons||[];
    var depots=r.depots||[];
    var dernierDepotTs=r.dernierDepotTs||'';
    var dernierDepotDate=r.dernierDepotDate||'';
    var dernierDepotMs=r.dernierDepotMs||0; // ms numérique — comparaison fiable

    // ── Filtrer uniquement les livraisons/dépenses APRÈS le dernier dépôt ──
    // Comparaison en millisecondes — fiable quelle que soit la locale
    function apresDepot(ms){
      if(!dernierDepotMs) return true; // pas de dépôt → tout compte
      return (ms||0) > dernierDepotMs;
    }

    // Livraisons livrées après le dernier dépôt
    var livreesApres=livs.filter(function(l){
      return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE')||l.statut.includes('LIVRÉ'))
             && apresDepot(l.timestampMs);
    });

    // Dépenses en cours (non remises) après le dernier dépôt
    var deps=rd.depenses||[];
    var depensesApres=deps.filter(function(d){
      return d.statut!=='Remis' && apresDepot(d.timestampMs);
    });

    var totalARem=livreesApres.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var totalPrest=livreesApres.reduce(function(s,l){return s+parseFloat(l.prestation||0);},0);
    var totalDepenses=depensesApres.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);

    // Formule : Recouvré - Dépenses = À remettre (les dépenses sont déduites du recouvré)
    var solde=Math.max(0, totalARem - totalDepenses);

    var html='<div class="card" style="text-align:center;border-color:rgba(243,156,18,.3)">'
      +'<div style="font-size:11px;color:#888;margin-bottom:4px">Solde à remettre à Mehdi'+(dernierDepotDate?' <span style="font-size:9px;color:#4FC3F7">(depuis '+dernierDepotDate+')</span>':'')+'</div>'
      +'<div style="font-size:36px;font-weight:900;color:var(--gold)">'+fmt(solde)+' DA</div>'
      +'<div style="font-size:10px;color:#888;margin-top:6px;padding:6px;background:rgba(39,174,96,.06);border-radius:8px">'
        +'💰 Recouvré '+fmt(totalARem)+' DA &nbsp;−&nbsp; 💸 Dépenses '+fmt(totalDepenses)+' DA'
      +'</div>'
      +'<div style="display:flex;justify-content:space-around;margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)">'
        +'<div><div style="font-size:12px;font-weight:700;color:var(--g)">'+livreesApres.length+'</div><div style="font-size:10px;color:#888">Livrées</div></div>'
        +'<div><div style="font-size:12px;font-weight:700;color:var(--g)">'+fmt(totalARem)+'</div><div style="font-size:10px;color:#888">Recouvré</div></div>'
        +'<div><div style="font-size:12px;font-weight:700;color:var(--r)">−'+fmt(totalDepenses)+'</div><div style="font-size:10px;color:#888">Dépenses</div></div>'
        +'<div><div style="font-size:12px;font-weight:700;color:var(--g)">'+fmt(totalPrest)+'</div><div style="font-size:10px;color:#888">Ma prestation</div></div>'
      +'</div>'
    +'</div>';

    if(solde>0){
      html+='<button class="btn btn-g" onclick="ouvrirDepot('+solde+')" style="margin-bottom:12px">'
              +'💵 Dépôt de fonds — '+fmt(solde)+' DA'
            +'</button>';
    }

    // ── Livraisons récentes (après dernier dépôt) ──
    html+='<div class="slt">🚚 Livraisons (depuis dernier dépôt)</div>';
    if(!livreesApres.length){
      html+='<div class="empty">Aucune livraison depuis le dernier dépôt</div>';
    } else {
      livreesApres.slice().reverse().slice(0,20).forEach(function(l){
        html+='<div class="li lg">'
          +'<div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(l.nom||'Client')+'</div>'
            +'<div class="li-sb">📍 '+h(l.wilaya||'')+' · 📅 '+h(l.date||'')+'</div>'
          +'</div><div style="text-align:right">'
            +'<div style="font-size:12px;font-weight:700;color:var(--gold)">'+fmt(l.aRemettre||0)+' DA</div>'
            +'<div style="font-size:10px;color:#888;margin-top:2px">+'+fmt(l.prestation||0)+' prestation</div>'
            +'<button class="btn-sm" style="background:#555;margin-top:4px;font-size:10px" onclick="editLivraisonBilel(\''+h(l.numCmd)+'\','+( l.prestation||0)+','+( l.aRemettre||0)+')">✏️</button>'
          +'</div></div></div>';
      });
    }

    // ── Dépenses en cours après dernier dépôt ──
    html+='<div class="slt">💸 Dépenses déduites</div>';
    if(!depensesApres.length){
      html+='<div class="empty">Aucune dépense en cours</div>';
    } else {
      depensesApres.slice().reverse().forEach(function(d){
        html+='<div class="li lr">'
          +'<div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(d.designation||'Dépense')+'</div>'
            +'<div class="li-sb">📅 '+h(d.date||'')+'</div>'
          +'</div><div style="text-align:right">'
            +'<div style="font-size:14px;font-weight:700;color:var(--r)">−'+fmt(d.montant)+' DA</div>'
          +'</div></div></div>';
      });
    }

    // ── Historique dépôts ──
    html+='<div class="slt">📋 Historique dépôts</div>';
    if(!depots.length){
      html+='<div class="empty">Aucun dépôt effectué</div>';
    } else {
      depots.slice().reverse().forEach(function(d){
        html+='<div class="li lg">'
          +'<div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">💵 Dépôt de fonds</div>'
            +'<div class="li-sb">📅 '+h(d.date||'')+'</div>'
          +'</div><div style="text-align:right">'
            +'<div style="font-size:14px;font-weight:700;color:var(--gold)">'+fmt(d.montant||0)+' DA</div>'
            +'<div class="bdg bg" style="margin-top:3px">✅ Remis</div>'
          +'</div></div></div>';
      });
    }

    div.innerHTML=html;
  });
}

function rBilelHistorique(div){
  div.innerHTML='<div class="slt">📋 Historique complet</div>'+_skelHtml(8);
  getAPIs(['livraisons_bilel','depenses_bilel'],function(_bc){
    var r=_bc['livraisons_bilel']||{}, rd=_bc['depenses_bilel']||{};
    var livs=r.livraisons||[];
    var depots=r.depots||[];
    var deps=rd.depenses||[];

    // Toutes les livraisons livrées (tout l'historique)
    var livreesToutes=livs.filter(function(l){
      return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE')||l.statut.includes('LIVRÉ'));
    });
    var retours=livs.filter(function(l){
      return l.statut&&l.statut.includes('Retour');
    });

    // KPIs globaux
    var totalRecouvreTout=livreesToutes.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var totalPrestTout=livreesToutes.reduce(function(s,l){return s+parseFloat(l.prestation||0);},0);
    var totalDepotsTout=depots.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
    var totalDepTout=deps.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);

    var html='<div class="kpi2" style="margin-bottom:12px">'
      +'<div class="kbox"><div class="kval" style="color:var(--g)">'+livreesToutes.length+'</div><div class="klbl">Total livrées</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--gold)">'+fmt(totalRecouvreTout)+'</div><div class="klbl">Total recouvré</div></div>'
      +'<div class="kbox"><div class="kval" style="color:var(--g)">'+fmt(totalPrestTout)+'</div><div class="klbl">Total prestations</div></div>'
      +'<div class="kbox"><div class="kval" style="color:#4FC3F7">'+depots.length+'</div><div class="klbl">Dépôts effectués</div></div>'
      +'</div>'
      +'<div style="background:rgba(39,174,96,.08);border-radius:10px;padding:10px;margin-bottom:12px;font-size:11px;color:#aaa;text-align:center">'
      +'💰 '+fmt(totalRecouvreTout)+' recouvré &nbsp;−&nbsp; 💵 '+fmt(totalDepotsTout)+' déposé &nbsp;−&nbsp; 💸 '+fmt(totalDepTout)+' dépenses'
      +'</div>';

    // ── Tableau par période (entre chaque dépôt) ──────────────────────
    // Construire les périodes : [début, fin] entre chaque dépôt
    var periodes=[];
    var tousDepots=depots.slice().sort(function(a,b){return (a.timestampMs||0)-(b.timestampMs||0);});
    var debutMs=0;
    tousDepots.forEach(function(dep,i){
      var finMs=dep.timestampMs||0;
      var livPer=livreesToutes.filter(function(l){return (!debutMs||l.timestampMs>debutMs)&&l.timestampMs<=finMs;});
      var depPer=deps.filter(function(d){return (!debutMs||d.timestampMs>debutMs)&&d.timestampMs<=finMs;});
      periodes.push({
        label:'Période '+(i+1),
        debut:debutMs, fin:finMs,
        dateDepot:dep.date, heureDepot:dep.heure||'',
        montantDepot:dep.montant,
        livraisons:livPer, depenses:depPer,
        recouvre:livPer.reduce(function(s,l){return s+l.aRemettre;},0),
        depTotal:depPer.reduce(function(s,d){return s+d.montant;},0),
        prest:livPer.reduce(function(s,l){return s+l.prestation;},0),
      });
      debutMs=finMs;
    });
    // Période en cours (après dernier dépôt)
    var livCours=livreesToutes.filter(function(l){return !debutMs||l.timestampMs>debutMs;});
    var depCours=deps.filter(function(d){return d.statut!=='Remis'&&(!debutMs||d.timestampMs>debutMs);});
    if(livCours.length||depCours.length){
      periodes.push({
        label:'En cours',
        debut:debutMs, fin:0,
        dateDepot:'', heureDepot:'',
        montantDepot:0,
        livraisons:livCours, depenses:depCours,
        recouvre:livCours.reduce(function(s,l){return s+l.aRemettre;},0),
        depTotal:depCours.reduce(function(s,d){return s+d.montant;},0),
        prest:livCours.reduce(function(s,l){return s+l.prestation;},0),
      });
    }

    // Afficher les périodes (de la plus récente à la plus ancienne)
    periodes.slice().reverse().forEach(function(per){
      var enCours=(per.montantDepot===0);
      var soldeFinal=Math.max(0,per.recouvre-per.depTotal);
      html+='<div class="card" style="border-color:'+(enCours?'rgba(243,156,18,.4)':'rgba(39,174,96,.3)')+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
          +'<div style="font-size:12px;font-weight:700;color:'+(enCours?'var(--gold)':'var(--g)') +'">'+per.label+(enCours?' ← actuelle':'')+' </div>'
          +(per.dateDepot?'<div style="font-size:10px;color:#888">Déposé le '+per.dateDepot+(per.heureDepot?' à '+per.heureDepot:'')+'</div>':'')
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px;padding:8px;background:rgba(255,255,255,.04);border-radius:8px">'
          +'<div style="text-align:center"><div style="font-weight:700;color:var(--gold)">'+fmt(per.recouvre)+'</div><div style="color:#888">Recouvré</div></div>'
          +'<div style="text-align:center"><div style="font-weight:700;color:var(--r)">−'+fmt(per.depTotal)+'</div><div style="color:#888">Dépenses</div></div>'
          +'<div style="text-align:center"><div style="font-weight:700;color:var(--g)">'+fmt(per.prest)+'</div><div style="color:#888">Prestations</div></div>'
          +'<div style="text-align:center"><div style="font-weight:700;color:'+(enCours?'var(--gold)':'var(--g)')+'">'+fmt(enCours?soldeFinal:per.montantDepot)+'</div><div style="color:#888">'+(enCours?'À remettre':'Déposé')+'</div></div>'
        +'</div>';

      // Livraisons de cette période
      if(per.livraisons.length){
        per.livraisons.slice().reverse().forEach(function(l){
          html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 4px;border-bottom:1px solid var(--brd);font-size:11px">'
            +'<div>'
              +'<div style="font-weight:600;color:#ddd">'+h(l.nom||'—')+'</div>'
              +'<div style="color:#888">📍 '+h(l.wilaya||'')+(l.date?' · 📅 '+l.date:'')+'</div>'
            +'</div>'
            +'<div style="text-align:right;flex-shrink:0">'
              +'<div style="color:var(--gold);font-weight:700">'+fmt(l.aRemettre)+' DA</div>'
              +'<div style="color:#888;font-size:10px">+'+fmt(l.prestation)+' prest.</div>'
            +'</div>'
          +'</div>';
        });
      }
      // Dépenses de cette période
      if(per.depenses.length){
        per.depenses.slice().reverse().forEach(function(d){
          html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 4px;border-bottom:1px solid var(--brd);font-size:11px">'
            +'<div><div style="color:#E74C3C">💸 '+h(d.designation||'Dépense')+'</div>'
            +'<div style="color:#888">📅 '+h(d.date||'')+'</div></div>'
            +'<div style="color:var(--r);font-weight:700;flex-shrink:0">−'+fmt(d.montant)+' DA</div>'
          +'</div>';
        });
      }
      html+='</div>';
    });

    if(!periodes.length) html+='<div class="empty">Aucun historique</div>';

    // Retours
    if(retours.length){
      html+='<div class="slt" style="color:var(--o)">↩️ Retours ('+retours.length+')</div>';
      retours.slice().reverse().forEach(function(l){
        html+='<div class="li lo"><div class="li-row"><div style="flex:1">'
          +'<div class="li-nm">'+h(l.nom||'Client')+'</div>'
          +'<div class="li-sb">📍 '+h(l.wilaya||'')+' · 📅 '+h(l.date||'')+'</div>'
        +'</div><div class="bdg bo">↩️ Retour</div></div></div>';
      });
    }

    div.innerHTML=html;
  });
}

function rZahraConf(div, _fil){
  var fil=_fil||localStorage.getItem((P||'z')+'_conf_fil')||'Tous';
  getAPI('commandes_confirmation',function(r){
    var cmdes=r.commandes||[];

    function suiviBadge(etat){
      var e=String(etat||'').toUpperCase();
      if(!e||e==='EN ATTENTE') return '';
      if(e.includes('INJOIGN')) return '<span style="display:inline-block;margin-top:4px;background:rgba(231,76,60,.15);color:var(--r);border:1px solid rgba(231,76,60,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Injoignable</span>';
      if(e.includes('OCCUP'))  return '<span style="display:inline-block;margin-top:4px;background:rgba(231,76,60,.12);color:var(--o);border:1px solid rgba(231,76,60,.25);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Occupe</span>';
      if(e.includes('RAPPEL')) return '<span style="display:inline-block;margin-top:4px;background:rgba(52,152,219,.12);color:#4FC3F7;border:1px solid rgba(52,152,219,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">A rappeler</span>';
      if(e.includes('SHOWROOM')) return '<span style="display:inline-block;margin-top:4px;background:rgba(155,89,182,.15);color:#A569BD;border:1px solid rgba(155,89,182,.3);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">🏛️ Showroom</span>';
      return '<span style="display:inline-block;margin-top:4px;background:rgba(136,136,136,.1);color:#888;padding:2px 8px;border-radius:6px;font-size:10px">'+h(etat)+'</span>';
    }
    function ordreEtat(e){
      var u=String(e||'').toUpperCase();
      if(u.includes('RAPPEL')) return 0;
      if(u.includes('INJOIGN')||u.includes('OCCUP')) return 1;
      return 2;
    }

    // Compteurs
    var nbNeuf=0,nbRappel=0,nbInj=0,nbOcc=0;
    cmdes.forEach(function(c){
      var eu=String(c.etat||'').toUpperCase();
      if(eu.includes('RAPPEL')) nbRappel++;
      else if(eu.includes('INJOIGN')) nbInj++;
      else if(eu.includes('OCCUP')) nbOcc++;
      else nbNeuf++;
    });

    // Filtrer
    var filtrees=cmdes.filter(function(c){
      var eu=String(c.etat||'').toUpperCase();
      if(fil==='Tous') return true;
      if(fil==='Nouveau') return !eu||eu==='EN ATTENTE';
      if(fil==='Rappeler') return eu.includes('RAPPEL');
      if(fil==='Injoignable') return eu.includes('INJOIGN');
      if(fil==='Occupe') return eu.includes('OCCUP');
      return true;
    });

    // Trier par priorite
    var sorted=filtrees.slice().sort(function(a,b){return ordreEtat(a.etat)-ordreEtat(b.etat);});

    var html='';

    // ── Filtres cliquables ──
    var FILTRES=[
      {k:'Tous',     l:'Tous ('+cmdes.length+')',          c:'#555'},
      {k:'Nouveau',  l:'Nouveau ('+nbNeuf+')',              c:'var(--g)'},
      {k:'Rappeler', l:'Rappeler ('+nbRappel+')',           c:'#4FC3F7'},
      {k:'Injoignable',l:'Injoignable ('+nbInj+')',        c:'var(--r)'},
      {k:'Occupe',   l:'Occupe ('+nbOcc+')',               c:'var(--o)'},
    ];
    html+='<div class="filter-row" style="margin-bottom:10px;flex-wrap:wrap;gap:6px">';
    FILTRES.forEach(function(f){
      var on=f.k===fil;
      html+='<button class="fbtn'+(on?' on':'')+'" style="font-size:11px;'+(on?'background:'+f.c+';color:#fff;border-color:'+f.c:'color:'+f.c+';border-color:'+f.c)+'" onclick="_setZConfFil(\''+f.k+'\')">'+f.l+'</button>';
    });
    html+='</div>';

    html+='<div class="slt" style="margin-top:4px">A confirmer ('+sorted.length+')</div>';
    if(!sorted.length){html+='<div class="empty">Aucune commande dans ce filtre</div>';}
    else{
      sorted.forEach(function(c){
        var realIdx=cmdes.indexOf(c);
        var eu=String(c.etat||'').toUpperCase();
        var hasStatut=eu&&eu!=='EN ATTENTE'&&eu!=='';
        var borderCol=eu.includes('RAPPEL')?'rgba(52,152,219,.45)':eu.includes('INJOIGN')||eu.includes('OCCUP')?'rgba(231,76,60,.4)':'rgba(39,174,96,.2)';
        var prodDisplay=c.variant&&c.variant!==c.produit?h(c.variant):h(c.produit);
        var dimMatch=String(c.variant||c.produit||'').match(/(\d+cm)/i);
        var dimLabel=dimMatch?' <span style="background:rgba(233,69,96,.2);color:var(--ac);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700">'+dimMatch[1]+'</span>':'';
        html+='<div class="li" style="border-left:3px solid '+borderCol+'">'
          +'<div class="li-row"><div style="flex:1">'
            +'<div class="li-nm">'+h(c.nom)+_srcBadge(c.numCmd)+'</div>'
            +'<div class="li-sb">'+prodDisplay+dimLabel+'</div>'
            +'<div class="li-sb" style="color:#aaa">'+h(c.wilaya)+' · '+h(c.date||'')+'</div>'
            +'<div class="li-sb" style="color:var(--gold)">'+fmt(c.montant)+' DA</div>'
            +(hasStatut?'<div style="margin-top:2px">'+suiviBadge(c.etat)+'</div>':'')
          +'</div>'
          +'<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'
            +'<a href="tel:'+h(c.tel)+'" style="background:var(--g);color:#fff;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none;text-align:center">📞</a>'
            +'<a href="'+waLink(c.tel,msgConfirmationClient(c))+'" target="_blank" style="display:block;background:#25D366;color:#fff;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none;text-align:center">WA</a>'
            +'<button class="btn-sm" style="background:var(--ac)" onclick="openConf('+realIdx+')">Résultat</button>'
            +'<button class="btn-sm" style="background:#444" onclick="_editCmd('+_cmdeIdx(div,c.numCmd)+')">✏️</button>'
          +'</div>'
        +'</div></div>';
      });
    }
    div.innerHTML=html;
    div._cmdes=cmdes;
    div._confFil=fil;
  });
}

      // Rafraichir DANS le meme onglet — pas de goTab
      var tc=document.querySelector('.tc');
      var fil=tc&&tc._confFil?tc._confFil:'Tous';
      var statInterm=stat==='INJOIGNABLE'||stat==='OCCUPE'||stat==='RAPPELER';
      if(statInterm){
        showSuc('',stat,c.nom,[]);
        setTimeout(function(){if(tc) rZahraConf(tc,fil);},700);
      } else {
        showSuc('',stat+(transp?' - Via '+transp:''),c.nom,acts);
        setTimeout(function(){if(tc) rZahraConf(tc,fil);},1200);
      }
    });
  },'Valider');
}

// Helper : retrouver l'index d'une commande dans div._cmdes par numCmd
function _cmdeIdx(div, numCmd){
  var cmdes = div && div._cmdes ? div._cmdes : [];
  var idx = cmdes.findIndex ? cmdes.findIndex(function(c){return c.numCmd===numCmd;}) : -1;
  return idx;
}
// Ouvrir la popup de modification depuis l'index dans div._cmdes
function _editCmd(idx){
  var div = document.querySelector('.tc');
  var cmdes = div && div._cmdes ? div._cmdes : [];
  var c = cmdes[idx];
  if(!c) return;
  ouvrirEditCommande(
    c.numCmd, c.nom, c.tel, c.wilaya,
    c.produit||c.variant||'', c.montant||0,
    c.commune||'', c.adresse||c.commune||c.wilaya||''
  );
}

function ouvrirEditCommande(numCmd, nom, tel, wilaya, produit, montant, commune, adresse){
  commune = commune||'';
  adresse = adresse||commune||wilaya||'';
  var trackNoest = _noestGetTracking(numCmd)||'';

  var pOpts = PRODS.map(function(p){
    var sel = (p.label===produit||p.titre===produit)?'selected':'';
    return '<option value="'+h(p.label)+'" '+sel+'>'+h(p.label)+'</option>';
  }).join('');

  var upsellOpts = '<option value="">-- Article supplementaire (optionnel)</option>'
    + PRODS.map(function(p){
        return '<option value="'+h(p.label)+'|'+p.prix+'">'+h(p.label)+' - '+fmt(p.prix)+' DA</option>';
      }).join('');

  var body = ''
    +'<div style="font-size:11px;color:#888;margin-bottom:8px">N '+h(numCmd)
      +(trackNoest?' · <span style="color:#4FC3F7">Noest: '+trackNoest+'</span>':'')+'</div>'
    +'<div style="font-size:11px;color:#888;font-weight:700;margin-bottom:4px">Client</div>'
    +'<input class="inp" id="ec_nom" placeholder="Nom *" value="'+h(nom)+'">'
    +'<input class="inp" id="ec_tel" placeholder="Tel" value="'+h(tel)+'" type="tel">'
    +'<input class="inp" id="ec_wil" placeholder="Wilaya *" value="'+h(wilaya)+'">'
    +'<input class="inp" id="ec_com" placeholder="Commune" value="'+h(commune)+'">'
    +'<input class="inp" id="ec_adr" placeholder="Adresse" value="'+h(adresse)+'">'
    +'<div style="font-size:11px;color:#888;font-weight:700;margin:10px 0 4px">Commande</div>'
    +'<select class="inp" id="ec_prod"><option value="">-- Produit</option>'+pOpts+'</select>'
    +'<input type="number" class="amt-inp" id="ec_mt" placeholder="Montant DA" value="'+(montant||0)+'" inputmode="numeric">'
    +'<div style="font-size:11px;color:#888;font-weight:700;margin:10px 0 4px">Article supplementaire (upsell)</div>'
    +'<select class="inp" id="ec_upsell" onchange="_upsellChange()">'+upsellOpts+'</select>'
    +'<div id="ec_upsell_row" style="display:none;gap:6px;margin-top:4px">'
      +'<input type="number" class="inp" id="ec_upsell_qty" placeholder="Qte" value="1" style="width:70px;margin:0">'
      +'<input type="number" class="inp" id="ec_upsell_prix" placeholder="Prix DA" style="flex:1;margin:0" inputmode="numeric">'
    +'</div>'
    +'<div style="font-size:11px;color:#888;font-weight:700;margin:10px 0 6px">Option</div>'
    +'<div id="ec_showroom_btn" onclick="_toggleShowroom()" style="padding:10px;border-radius:10px;background:#0A0A14;border:1px solid var(--brd);text-align:center;font-size:12px;cursor:pointer">🏛️ Invitation showroom</div>'
    +'<input type="hidden" id="ec_showroom" value="0">'
    +(trackNoest?'<div style="font-size:10px;color:#4FC3F7;margin-top:6px;padding:5px 8px;background:rgba(79,195,247,.08);border-radius:8px">Modification envoyee aussi a Noest</div>':'');

  showOv('Modifier — '+h(nom), body, function(){
    var newNom = document.getElementById('ec_nom').value.trim();
    var newWil = document.getElementById('ec_wil').value.trim();
    if(!newNom||!newWil){alert('Nom et Wilaya obligatoires');return;}
    var newProdLbl = document.getElementById('ec_prod').value;
    var _pr = PRODS.find(function(p){return p.label===newProdLbl;});

    var upsellVal = document.getElementById('ec_upsell').value;
    var upsellArticle = null;
    if(upsellVal){
      var parts = upsellVal.split('|');
      var uQty  = parseInt(document.getElementById('ec_upsell_qty').value)||1;
      var uPrix = parseFloat(document.getElementById('ec_upsell_prix').value)||parseFloat(parts[1])||0;
      upsellArticle = {produit:parts[0],qte:uQty,prix:uPrix};
    }

    var showroom = document.getElementById('ec_showroom').value==='1';
    var newMontant = parseInt(document.getElementById('ec_mt').value)||0;
    if(upsellArticle) newMontant += upsellArticle.prix * upsellArticle.qte;

    var dataSheets = {
      source:'UPDATE_COMMANDE', numCmd:numCmd,
      nom:newNom,
      tel:document.getElementById('ec_tel').value.trim()||undefined,
      wilaya:newWil,
      commune:document.getElementById('ec_com').value.trim()||undefined,
      adresse:document.getElementById('ec_adr').value.trim()||undefined,
      produit:_pr?_pr.titre:(newProdLbl||undefined),
      variant:_pr?_pr.variant:undefined,
      montant:newMontant,
      upsell:upsellArticle||undefined,
      notes:showroom?'Invitation showroom demandee':undefined,
    };

    send(dataSheets, function(r){
      if(r&&r.updated){
        if(trackNoest) send({source:'MODIFIER_NOEST',tracking:trackNoest,nom:newNom,tel:dataSheets.tel,wilaya:newWil,montant:dataSheets.montant},function(){});
        var msg = numCmd+(upsellArticle?' + '+upsellArticle.produit:'')+(showroom?' - Showroom note':'');
        showSuc('','Commande modifiee !', msg, []);
        invalidateCache(['commandes_bilel','commandes_confirmation','confirmations']);
        setTimeout(refreshTab, 600);
      } else {
        showSuc('','Erreur','Commande non trouvee',[]);
      }
    });
  }, 'Enregistrer');
}
function _upsellChange(){
  var val = document.getElementById('ec_upsell').value;
