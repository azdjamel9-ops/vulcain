            +'<span style="font-size:11px;color:var(--r)">❌ '+cFaux+' faux/annulé</span>'
            +'<span style="font-size:11px;color:var(--o)">📵 '+cRapp+' autres</span>'
            +'</div></div>';
        }

        html+='</div>';
      });

      div.innerHTML=html;
    });
  });
}

// ── NESRINE ATELIER — Production Moh + Activité Zahra unifiées ──
function rNesAtelier(div){
  div.innerHTML='<div class="empty">Chargement...</div>';

  var filAgent = localStorage.getItem('na_agent')||'Tous';
  var filPer   = localStorage.getItem('na_per')||'Tous';

  // Charger les trois sources en PARALLÈLE
  getAPIs(['production_moh','journee_zahra','confirmations'], function(_res){
    var rMoh   = _res['production_moh']  || {};
    var rZahra = _res['journee_zahra']   || {};
    var rConf  = _res['confirmations']   || {};
    (function(){

        var tday = today();
        var hier = new Date(Date.now()-864e5).toLocaleDateString('fr-FR');
        var semCut = new Date(Date.now()-7*864e5).toLocaleDateString('fr-FR');
        var moisCut= new Date(Date.now()-30*864e5).toLocaleDateString('fr-FR');

        // ── Construire une liste d'événements unifiée ──
        var events = [];

        // Productions Moh
        if(filAgent==='Tous'||filAgent==='Moh'){
          (rMoh.productions||[]).forEach(function(p){
            events.push({
              date:   p.date||'',
              agent:  'Moh',
              type:   'prod',
              label:  (function(){
                var m=String(p.produit||'').match(/(\d+cm)/i);
                return m ? '⚡ ROSA '+m[1] : h(p.produit);
              })(),
              detail: '×'+p.qte+(p.paye?' ✓ PAYÉ':''),
              color:  p.paye?'var(--g)':'var(--o)'
            });
          });
        }

        // Activité Zahra (tâches)
        if(filAgent==='Tous'||filAgent==='Aicha'){
          (rZahra.journees||[]).forEach(function(j){
            var taches=j.taches||{};
            Object.keys(taches).forEach(function(tid){
              var t=taches[tid];
              var ic=tid==='finition'?'✨':tid==='emballage'?'📦':tid==='bio'?'🔥':'🚐';
              var lbl=tid==='finition'?'Finition':tid==='emballage'?'Emballage':tid==='bio'?'Bioéthanol':'Noest';
              var detail='×'+t.qte;
              if(t.prods&&t.prods.length){
                detail+=' — '+t.prods.map(function(p){return p.prod+' ×'+p.q;}).join(', ');
              }
              events.push({
                date:   j.date||'',
                agent:  'Aicha',
                type:   tid,
                label:  ic+' '+lbl,
                detail: detail,
                color:  tid==='finition'?'#378ADD':tid==='emballage'?'var(--o)':'var(--g)'
              });
            });
          });

          // Confirmations Zahra
          var confByDate={};
          (rConf.confirmations||[]).filter(function(c){return c.confirmedBy==='Aicha';})
            .forEach(function(c){
              var d=c.date||'?';
              if(!confByDate[d])confByDate[d]={total:0,conf:0,faux:0,autres:0};
              confByDate[d].total++;
              var e=String(c.etat||'').toUpperCase();
              if(e.includes('CONFIRM'))confByDate[d].conf++;
              else if(e.includes('FAUX')||e.includes('ANNUL'))confByDate[d].faux++;
              else confByDate[d].autres++;
            });
          Object.keys(confByDate).forEach(function(d){
            var cd=confByDate[d];
            events.push({
              date:   d,
              agent:  'Aicha',
              type:   'conf',
              label:  '📞 Confirmations',
              detail: cd.total+' traitées — ✅'+cd.conf+' ❌'+cd.faux+' 📵'+cd.autres,
              color:  'var(--g)'
            });
          });
        }

        // Trier du plus récent au plus ancien (format jj/mm/aaaa)
        events.sort(function(a,b){
          var da=a.date.split('/').reverse().join('-');
          var db=b.date.split('/').reverse().join('-');
          if(db!==da)return db.localeCompare(da);
          // Même date : Moh avant Zahra
          return a.agent==='Moh'?-1:1;
        });

        // Filtrer par période (codes courts : Auj, Hier, 7j, 30j)
        if(filPer!=='Tous'){
          events=events.filter(function(e){
            var d=e.date;
            var ds=d.split('/').reverse().join('-');
            if(filPer==='Auj')  return d===tday;
            if(filPer==='Hier') return d===hier;
            if(filPer==='7j')   return ds>=semCut.split('/').reverse().join('-');
            if(filPer==='30j')  return ds>=moisCut.split('/').reverse().join('-');
            return true;
          });
        }

        // ── Construire le HTML ──
        var html='';

        // KPIs globaux (non filtrés)
        var allProd=rMoh.productions||[];
        var totMoh=allProd.reduce(function(s,p){return s+p.qte;},0);
        var totZahra=(rZahra.journees||[]).reduce(function(s,j){
          return s+Object.values(j.taches||{}).reduce(function(ss,t){return ss+t.qte;},0);
        },0);
        html+='<div class="kpi2" style="margin-bottom:10px">'
          +'<div class="kbox"><div class="kval" style="color:#1D9E75">'+totMoh+'</div><div class="klbl">⚡ Total Moh</div></div>'
          +'<div class="kbox"><div class="kval" style="color:#D85A30">'+totZahra+'</div><div class="klbl">📦 Total Zahra</div></div>'
          +'</div>';

        // Filtres
        html+='<div class="filter-row">';
        ['Tous','Moh','Aicha'].forEach(function(f){
          html+='<button class="fbtn'+(f===filAgent?' on':'')+'" onclick="setNaFil(\'agent\',\''+f+'\')">'+f+'</button>';
        });
        html+='</div>';
        html+='<div class="filter-row">';
        var NA_CODES=['Tous','Auj','Hier','7j','30j'];
        var NA_LBLS=["Tous","Aujourd\'hui","Hier","7 jours","30 jours"];
        NA_CODES.forEach(function(code,i){
          html+='<button class="fbtn'+(code===filPer?' on':'')+'" onclick="setNaFil(\'per\',\''+code+'\')">'+NA_LBLS[i]+'</button>';
        });
        html+='</div>';

        if(!events.length){
          html+='<div class="empty">Aucune activité sur cette période</div>';
          div.innerHTML=html; return;
        }

        // Grouper par date pour l'affichage
        var byDate={};
        events.forEach(function(e){
          if(!byDate[e.date])byDate[e.date]=[];
          byDate[e.date].push(e);
        });
        var dates=Object.keys(byDate).sort(function(a,b){
          return b.split('/').reverse().join('-').localeCompare(a.split('/').reverse().join('-'));
        });

        function fmtDateLong(d){
          if(!d||!d.includes('/'))return d;
          var p=d.split('/');
          var dt=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
          return dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        }
        dates.forEach(function(d){
          var isToday=(d===tday);
          var lbl=isToday?'Aujourd\'hui — '+fmtDateLong(d):fmtDateLong(d);
          html+='<div style="margin-bottom:6px;font-size:12px;font-weight:700;color:'+(isToday?'var(--ac)':'#888')+';padding:6px 0 2px;border-bottom:1px solid rgba(255,255,255,.07)">📅 '+lbl+'</div>';
          byDate[d].forEach(function(e){
            var agentCol=e.agent==='Moh'?'#1D9E75':'#D85A30';
            var agentIc=e.agent==='Moh'?'⚡':'📦';
            html+='<div class="li" style="border-left-color:'+agentCol+';margin-bottom:6px">'
              +'<div class="li-row"><div style="flex:1">'
              +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'
              +'<span style="font-size:10px;font-weight:700;color:'+agentCol+';background:'+agentCol+'20;padding:2px 6px;border-radius:4px">'+agentIc+' '+e.agent+'</span>'
              +'<span style="font-size:13px;font-weight:600">'+e.label+'</span>'
              +'</div>'
              +'<div style="font-size:11px;color:'+e.color+'">'+e.detail+'</div>'
              +'</div></div></div>';
          });
        });

        div.innerHTML=html;
        // Mémoriser pour rechargement après filtrage
        div._naAgent=filAgent; div._naPer=filPer;
    })();
  });
}
function setNaFil(type, val){
  localStorage.setItem(type==='agent'?'na_agent':'na_per', val);

function rMehdiDash(div){
  var fil=localStorage.getItem('mdash_fil')||'mois';
  div.innerHTML='<div class="slt">📊 Dashboard Le Vulcain</div>'+_skelHtml(8);

  // IMPORTANT : utiliser commandes_confirmation pour TOUTES les commandes (pas seulement confirmées)
  // commandes_bilel = confirmées en attente de livraison
  // commandes_confirmation = à confirmer (non encore traitées)
  getAPIs(['commandes_bilel','commandes_confirmation','livraisons_bilel','depenses_bilel','production_moh','suivi_noest','journee_zahra'],function(_d){
    var rCmdes=_d['commandes_bilel']||{};
    var rConf=_d['commandes_confirmation']||{};
    var rLiv=_d['livraisons_bilel']||{};
    var rDep=_d['depenses_bilel']||{};
    var rProd=_d['production_moh']||{};
    var rNoest=_d['suivi_noest']||{};
    var rZahra=_d['journee_zahra']||{};

    var tday=today();
    var mois=tday.slice(3);

    function srcOf(num){
      var n=String(num||'').trim();
      if(/^(FB_|fb_)/i.test(n)) return 'IA';
      if(/^(WA|wa)/i.test(n)) return 'Manuelle';
      return 'Shopify';
    }
    function inPeriod(dateStr){
      if(!dateStr) return false;
      var d=normDate(dateStr);
      if(fil==='jour') return d===tday;
      if(fil==='mois') return d.length>=7&&d.slice(3)===mois;
      return true;
    }

    // ── COMMANDES : confirmées (commandes_bilel) + à confirmer (commandes_confirmation) ──
    var cmdesConf=rCmdes.commandes||[];      // déjà confirmées, en attente de livraison
    var cmdesAConf=rConf.commandes||[];      // à confirmer (toutes sources)

    // Fusionner pour la vue totale
    var allCmdes=[].concat(cmdesConf, cmdesAConf);
    var allPer=allCmdes.filter(function(c){return inPeriod(c.date);});

    // Compter par source sur TOUTES les commandes de la période
    var nbShop=0,nbIA=0,nbMan=0;
    allPer.forEach(function(c){
      var src=srcOf(c.numCmd);
      if(src==='Shopify') nbShop++;
      else if(src==='IA') nbIA++;
      else nbMan++;
    });

    // CA — sur toutes les commandes confirmées de la période
    var confPer=cmdesConf.filter(function(c){return inPeriod(c.date);});
    var aConfPer=cmdesAConf.filter(function(c){return inPeriod(c.date);});
    var caConf=confPer.reduce(function(s,c){return s+parseFloat(c.montant||0);},0);
    var caAConf=aConfPer.reduce(function(s,c){return s+parseFloat(c.montant||0);},0);
    var caTotal=caConf+caAConf;

    // ── LIVRAISONS BILEL ──
    var livs=rLiv.livraisons||[];
    var dernierDepotMs=rLiv.dernierDepotMs||0;
    var dernierDepotDate=rLiv.dernierDepotDate||'';
    var livApresDepot=livs.filter(function(l){
      return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE'))&&(l.timestampMs||0)>dernierDepotMs;
    });
    var depApresDepot=(rDep.depenses||[]).filter(function(d){return d.statut!=='Remis'&&(d.timestampMs||0)>dernierDepotMs;});
    var recouvrApres=livApresDepot.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var depensApres=depApresDepot.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
    var soldeBilel=Math.max(0,recouvrApres-depensApres);

    var livreesPer=livs.filter(function(l){return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE'))&&inPeriod(l.date);});
    var recouvrePer=livreesPer.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var prestBilel=livApresDepot.reduce(function(s,l){return s+parseFloat(l.prestation||0);},0);
    var depensesPer=(rDep.depenses||[]).filter(function(d){return inPeriod(d.date);}).reduce(function(s,d){return s+parseFloat(d.montant||0);},0);

    // ── NOEST ──
    var noestCmdes=rNoest.commandes||[];
    var noestEnCours=noestCmdes.filter(function(g){

      var num=String(c.numCmd||'');

      if(num.startsWith('WA')||num.startsWith('wa')) return 'Manuelle';

function rMehdiBilel(div){
  div.innerHTML='<div class="slt">🚚 Compte Bilel</div>'+_skelHtml(6);
  getAPIs(['livraisons_bilel','depenses_bilel'],function(_b){
    var rL=_b['livraisons_bilel']||{}, rD=_b['depenses_bilel']||{};
    var livs=rL.livraisons||[];
    var depots=rL.depots||[];
    var dernierDepotMs=rL.dernierDepotMs||0;
    var dernierDepotDate=rL.dernierDepotDate||'';
    var deps=rD.depenses||[];

    // Livraisons et dépenses après le dernier dépôt
    var livApres=livs.filter(function(l){
      return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE'))&&(l.timestampMs||0)>dernierDepotMs;
    });
    var depApres=deps.filter(function(d){return d.statut!=='Remis'&&(d.timestampMs||0)>dernierDepotMs;});
    var recouvrApres=livApres.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var depensApres=depApres.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
    var soldeBilel=Math.max(0,recouvrApres-depensApres);

    // Totaux globaux
    var livreesToutes=livs.filter(function(l){return l.statut&&(l.statut.includes('Livré')||l.statut.includes('LIVRE'));});
    var totalRecouvreTout=livreesToutes.reduce(function(s,l){return s+parseFloat(l.aRemettre||0);},0);
    var totalDepotsTout=depots.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);

    var html='<div class="card" style="border-color:rgba(186,117,23,.3);text-align:center">'
      +'<div style="font-size:11px;color:#888;margin-bottom:4px">💵 Solde à remettre'+(dernierDepotDate?' <span style="font-size:9px;color:#4FC3F7">(depuis '+dernierDepotDate+')</span>':'')+'</div>'
      +'<div style="font-size:36px;font-weight:900;color:var(--gold)">'+fmt(soldeBilel)+' DA</div>'
      +'<div style="font-size:10px;color:#888;margin-top:6px;padding:6px;background:rgba(39,174,96,.06);border-radius:8px">💰 '+fmt(recouvrApres)+' recouvré &nbsp;−&nbsp; 💸 '+fmt(depensApres)+' dépenses</div>'
      +'<div style="display:flex;justify-content:space-around;margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)">'
        +'<div><div style="font-size:13px;font-weight:700;color:var(--g)">'+livApres.length+'</div><div style="font-size:10px;color:#888">Livrées</div></div>'
        +'<div><div style="font-size:13px;font-weight:700;color:var(--gold)">'+fmt(totalRecouvreTout)+'</div><div style="font-size:10px;color:#888">Total recouvré</div></div>'
        +'<div><div style="font-size:13px;font-weight:700;color:#4FC3F7">'+fmt(totalDepotsTout)+'</div><div style="font-size:10px;color:#888">Total déposé</div></div>'
        +'<div><div style="font-size:13px;font-weight:700;color:var(--o)">'+depots.length+'</div><div style="font-size:10px;color:#888">Dépôts</div></div>'
      +'</div>'
    +'</div>';

    if(soldeBilel>0){
      html+='<button class="btn btn-g" onclick="valRemise('+soldeBilel+')" style="margin-bottom:12px">💰 Valider remise Bilel — '+fmt(soldeBilel)+' DA</button>';
    }

    // Livraisons récentes
    html+='<div class="slt">🚚 Livraisons depuis dernier dépôt ('+livApres.length+')</div>';
    if(!livApres.length){html+='<div class="empty">Aucune livraison depuis le dernier dépôt</div>';}
    else{livApres.slice().reverse().slice(0,15).forEach(function(l){
      html+='<div class="li lg"><div class="li-row"><div style="flex:1">'
        +'<div class="li-nm">'+h(l.nom||'Client')+'</div>'
        +'<div class="li-sb">📍 '+h(l.wilaya||'')+' · 📅 '+h(l.date||'')+'</div>'
      +'</div><div style="text-align:right">'
        +'<div style="font-size:12px;font-weight:700;color:var(--gold)">'+fmt(l.aRemettre||0)+' DA</div>'
        +'<div style="font-size:10px;color:#888">+'+fmt(l.prestation||0)+' prest.</div>'
      +'</div></div></div>';
    });}

    // Dépenses en cours
    if(depApres.length){
      html+='<div class="slt">💸 Dépenses en cours ('+depApres.length+')</div>';
      depApres.slice().reverse().forEach(function(d){
        html+='<div class="li lr"><div class="li-row"><div style="flex:1">'
          +'<div class="li-nm">'+h(d.designation||'Dépense')+'</div>'
          +'<div class="li-sb">📅 '+h(d.date||'')+'</div>'
        +'</div><div style="color:var(--r);font-weight:700;flex-shrink:0">−'+fmt(d.montant)+' DA</div></div></div>';
      });
    }

    // Historique dépôts
    html+='<div class="slt">📋 Dépôts effectués ('+depots.length+')</div>';
    if(!depots.length){html+='<div class="empty">Aucun dépôt</div>';}
    else{depots.slice().reverse().forEach(function(d){
      html+='<div class="li lg"><div class="li-row"><div style="flex:1">'
        +'<div class="li-nm">💵 Dépôt de fonds</div>'
        +'<div class="li-sb">📅 '+h(d.date||'')+(d.heure?' à '+d.heure:'')+'</div>'
      +'</div><div style="text-align:right">'
        +'<div style="font-size:14px;font-weight:700;color:var(--gold)">'+fmt(d.montant||0)+' DA</div>'
        +'<div class="bdg bg" style="margin-top:3px">✅ Remis</div>'
      +'</div></div></div>';
    });}

    div.innerHTML=html;
  });
}


// ═══════════════════════════════════════════════════════════════════
// MEHDI ADS — Dashboard Campagnes Meta (depuis feuille Sheets)
// ═══════════════════════════════════════════════════════════════════
var _adsState = {
  data:[],                 // toutes les lignes brutes
  filCampagne:'Toutes',
  filAdset:'Tous',
  filProduit:'Tous',
  filPeriode:'7j',         // 7j | 30j | mois | tout
  tri:'depense',           // depense|roas|achats|conversations|ca
  triDir:-1,               // -1=desc 1=asc
};

function rMehdiAds(div){
  div.innerHTML='<div class="slt">📈 Campagnes Meta Ads</div>'+_skelHtml(6);
  getAPI('campagnes_meta',function(r){
    if(r.error){
      div.innerHTML='<div class="slt">📈 Campagnes Meta Ads</div>'
        +'<div class="card" style="border-color:rgba(231,76,60,.3);text-align:center;padding:24px">'
        +'<div style="font-size:40px;margin-bottom:10px">📋</div>'
        +'<div style="font-weight:700;color:var(--r);margin-bottom:6px">Feuille introuvable</div>'
        +'<div style="font-size:11px;color:#888">Créer une feuille nommée <b style="color:#fff">Campagne</b> dans Google Sheets</div></div>';
      return;
    }
    _adsState.raw=r;
    _adsRender(div);
  });
}

var _adsState={
  raw:null,
  filAdset:'Tous',
  filVerdict:'Tous',
  filProduit:'Tous',
  tri:'spend',
  triDir:-1,
  vue:'adsets', // 'adsets' | 'ads'
};

function _verdictStyle(v){
  if(!v) return {col:'#888',bg:'rgba(136,136,136,.1)',ic:'—'};
  if(v.includes('Scale')) return {col:'#4FC3F7',bg:'rgba(79,195,247,.1)',ic:'🚀'};
  if(v.includes('Profit')) return {col:'var(--g)',bg:'rgba(39,174,96,.1)',ic:'✅'};
  if(v.includes('Trop')) return {col:'#888',bg:'rgba(136,136,136,.08)',ic:'⏳'};
  if(v.includes('Pauser')||v.includes('Pause')) return {col:'var(--r)',bg:'rgba(231,76,60,.1)',ic:'🔴'};
  return {col:'#888',bg:'rgba(136,136,136,.08)',ic:'•'};
}

function _fmtEur(v){ if(v===null||v===undefined) return '—'; return v.toFixed(2)+'€'; }
function _fmtN(v){ if(v===null||v===undefined) return '—'; return Math.round(v).toLocaleString('fr-FR'); }

function _adsRender(div){
  var r=_adsState.raw;
  if(!r) return;
  var g=r.global||{};
  var allAdsets=r.adsets||[];
  var allAds=r.ads||[];

  // ── Filtres dynamiques ──
  var uniqAdsets=['Tous'].concat(allAdsets.map(function(a){return a.nom;}).filter(Boolean));
  var uniqVerdicts=['Tous','🚀 Scale','✅ Profitable','⏳ Trop tôt','🔴 Pauser'];
  var uniqProduits=['Tous'].concat([...new Set(allAds.map(function(a){
    // Extraire produit du nom de l'annonce (avant " — ")
    return a.nom.split(' — ')[0].split(' — ')[0].trim();
  }).filter(Boolean))].sort());

  // Filtrer les ads
  var ads=allAds.filter(function(a){
    if(_adsState.filAdset!=='Tous'&&a.adset!==_adsState.filAdset) return false;
    if(_adsState.filVerdict!=='Tous'){
      var vk=_adsState.filVerdict.replace(/[🚀✅⏳🔴]\s*/,'');
      if(!a.verdict.includes(vk)) return false;
    }
    if(_adsState.filProduit!=='Tous'){
      var pk=a.nom.split(' — ')[0].trim();
      if(pk!==_adsState.filProduit) return false;
    }
    return true;
  });

  // Trier
  ads=ads.slice().sort(function(a,b){
    var av=a[_adsState.tri]||0, bv=b[_adsState.tri]||0;
    return _adsState.triDir*(bv-av);
  });

  var gvs=_verdictStyle(g.verdict);
  var html='';

  // ① RÉSUMÉ GLOBAL
  html+='<div style="background:linear-gradient(135deg,rgba(55,138,221,.15),rgba(24,95,165,.1));border:2px solid rgba(55,138,221,.4);border-radius:18px;padding:14px;margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div style="font-size:11px;font-weight:700;color:#4FC3F7;text-transform:uppercase;letter-spacing:.5px">📊 Résumé global</div>'
      +'<div style="font-size:10px;color:#555">🔄 '+h(r.lastUpdate||'')+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">'
    +'<div style="background:rgba(0,0,0,.3);border-radius:12px;padding:10px;text-align:center">'
      +'<div style="font-size:20px;font-weight:900;color:var(--r)">'+_fmtEur(g.spend)+'</div>'
      +'<div style="font-size:9px;color:#888;margin-top:2px">💸 Dépense</div>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,.3);border-radius:12px;padding:10px;text-align:center">'
      +'<div style="font-size:20px;font-weight:900;color:var(--g)">'+(g.achats!==null?g.achats:'—')+'</div>'
      +'<div style="font-size:9px;color:#888;margin-top:2px">🛒 Achats</div>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,.3);border-radius:12px;padding:10px;text-align:center">'
      +'<div style="font-size:20px;font-weight:900;color:'+(g.cpa&&g.cpa<4.8?'var(--g)':g.cpa&&g.cpa<6?'var(--o)':g.cpa?'var(--r)':'#888')+'">'+_fmtEur(g.cpa)+'</div>'
      +'<div style="font-size:9px;color:#888;margin-top:2px">🎯 CPA</div>'
    +'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">'
    +'<div style="background:rgba(0,0,0,.3);border-radius:10px;padding:8px;text-align:center">'
      +'<div style="font-size:14px;font-weight:700;color:#aaa">'+_fmtN(g.impressions)+'</div>'
      +'<div style="font-size:9px;color:#555">👁 Impressions</div>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,.3);border-radius:10px;padding:8px;text-align:center">'
      +'<div style="font-size:14px;font-weight:700;color:#aaa">'+_fmtN(g.reach)+'</div>'
      +'<div style="font-size:9px;color:#555">📡 Reach</div>'
    +'</div>'
    +'</div>'
    +(g.verdict?'<div style="margin-top:10px;text-align:center;padding:8px;background:'+gvs.bg+';border-radius:10px;font-size:12px;font-weight:700;color:'+gvs.col+'">'+h(g.verdict)+'</div>':'')
  +'</div>';

  // ② SEUILS
  html+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'
    +'<div style="flex:1;min-width:80px;background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.3);border-radius:10px;padding:7px;text-align:center"><div style="font-size:11px;font-weight:700;color:#4FC3F7">🚀 &lt;4.8€</div><div style="font-size:9px;color:#888">Scale</div></div>'
    +'<div style="flex:1;min-width:80px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);border-radius:10px;padding:7px;text-align:center"><div style="font-size:11px;font-weight:700;color:var(--g)">✅ &lt;6€</div><div style="font-size:9px;color:#888">Profitable</div></div>'
    +'<div style="flex:1;min-width:80px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:7px;text-align:center"><div style="font-size:11px;font-weight:700;color:var(--r)">🔴 &gt;9€</div><div style="font-size:9px;color:#888">Pauser</div></div>'
  +'</div>';

  // ③ ADSETS
  html+='<div class="slt">📦 Adsets ('+allAdsets.length+')</div>';
  allAdsets.forEach(function(a){
    var vs=_verdictStyle(a.verdict);
    var actif=_adsState.filAdset===a.nom;
    html+='<div style="background:'+(actif?'rgba(55,138,221,.12)':'#0A0A14')+';border:1px solid '+(actif?'rgba(55,138,221,.5)':'var(--brd)')+';border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer" onclick="_adsFilAdset(\''+h(a.nom)+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:11px;font-weight:700;color:#ddd;word-break:break-word">'+h(a.nom)+'</div>'
          +'<div style="font-size:10px;color:#888;margin-top:3px">'
            +'👁 '+_fmtN(a.impressions)+' · 📡 '+_fmtN(a.reach)
          +'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0;margin-left:10px">'
          +'<div style="font-size:14px;font-weight:900;color:var(--r)">'+_fmtEur(a.spend)+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+(a.achats?'var(--g)':'#888')+'">'+(a.achats?'🛒 '+a.achats+' · '+ _fmtEur(a.cpa):'⏳')+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="margin-top:6px;display:inline-block;padding:3px 10px;background:'+vs.bg+';border-radius:8px;font-size:10px;font-weight:600;color:'+vs.col+'">'+h(a.verdict||'—')+'</div>'
      +(_adsState.filAdset===a.nom?'<div style="font-size:9px;color:#4FC3F7;margin-top:4px;text-align:center">↑ Filtre actif — cliquer pour retirer</div>':'')
    +'</div>';
  });

  // ④ FILTRES ADS
  html+='<div class="slt" style="margin-top:8px">🎯 Publicités</div>';

  // Filtres
  html+='<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">';
  uniqVerdicts.forEach(function(v){
    html+='<button class="fbtn'+(_adsState.filVerdict===v?' on':'')+'" style="font-size:10px;padding:4px 8px" onclick="_adsFilVerdict(\''+h(v)+'\')">'+h(v)+'</button>';
  });
  html+='</div>';

  // Filtre produit
  if(uniqProduits.length>2){
    html+='<div style="margin-bottom:8px;overflow-x:auto;display:flex;gap:6px;flex-wrap:nowrap;padding-bottom:4px">';
    uniqProduits.forEach(function(p){
      html+='<button class="fbtn'+(_adsState.filProduit===p?' on':'')+'" style="font-size:10px;padding:4px 8px;white-space:nowrap" onclick="_adsFilProduit(\''+h(p)+'\')">'+h(p.length>20?p.slice(0,20)+'…':p)+'</button>';
    });
    html+='</div>';
  }

  // Tri
  html+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap">'
    +'<span style="font-size:10px;color:#555">Tri:</span>';
  [{k:'spend',l:'Dépense'},{k:'achats',l:'Achats'},{k:'cpa',l:'CPA'},{k:'impressions',l:'Impr.'},{k:'reach',l:'Reach'}].forEach(function(t){
    var sel=t.k===_adsState.tri;
    html+='<button class="fbtn'+(sel?' on':'')+'" style="font-size:10px;padding:3px 8px" onclick="_adsSetTri(\''+t.k+'\')">'
      +t.l+(sel?(_adsState.triDir===-1?' ↓':' ↑'):'')+'</button>';
  });
  html+='<button class="fbtn" style="font-size:10px;padding:3px 8px;background:#333;color:#888" onclick="_adsReset()">↺ Reset</button>';
  html+='</div>';

  // ⑤ LISTE ADS
  if(!ads.length){
    html+='<div class="empty">Aucune publicité pour ces filtres</div>';
  } else {
    html+='<div style="font-size:10px;color:#888;margin-bottom:6px">'+ads.length+' publicité(s) affichée(s)</div>';
    ads.forEach(function(a){
      var vs=_verdictStyle(a.verdict);
      // Extraire nom produit et variante du nom de l'annonce
      var parts=a.nom.split(' — ');
      var produit=parts[0]||a.nom;
      var variante=parts.slice(1).join(' — ');

      html+='<div style="background:#0A0A14;border-radius:12px;padding:10px 12px;margin-bottom:6px;border-left:3px solid '+vs.col+'">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-size:11px;font-weight:700;color:#ddd">'+h(produit)+'</div>'
            +(variante?'<div style="font-size:9px;color:#666;margin-top:1px;word-break:break-word">'+h(variante)+'</div>':'')
            +'<div style="font-size:10px;color:#888;margin-top:3px">📦 '+h(a.adset||'—')+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
            +'<div style="font-size:13px;font-weight:900;color:var(--r)">'+_fmtEur(a.spend)+'</div>'
            +(a.achats!==null?'<div style="font-size:11px;color:var(--g)">🛒 '+a.achats+'</div>':'')
            +(a.cpa!==null?'<div style="font-size:10px;color:'+(a.cpa<4.8?'var(--g)':a.cpa<6?'var(--o)':'var(--r)')+'">CPA: '+_fmtEur(a.cpa)+'</div>':'')
          +'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">'
          +'<div style="display:flex;gap:10px;font-size:9px;color:#666">'
            +'<span>👁 '+_fmtN(a.impressions)+'</span>'
            +'<span>📡 '+_fmtN(a.reach)+'</span>'
          +'</div>'
          +'<div style="padding:2px 8px;background:'+vs.bg+';border-radius:6px;font-size:10px;font-weight:600;color:'+vs.col+'">'+h(a.verdict||'—')+'</div>'
        +'</div>'
      +'</div>';
    });
  }

  html+='<button class="btn btn-g" style="margin-top:8px;width:100%" onclick="_adsRefresh()">🔄 Actualiser</button>';
  div.innerHTML=html;
}

function _adsFilAdset(nom){
  _adsState.filAdset=(_adsState.filAdset===nom)?'Tous':nom;
  _adsRender(document.querySelector('.tc'));
}
function _adsFilVerdict(v){
  _adsState.filVerdict=(_adsState.filVerdict===v)?'Tous':v;
  _adsRender(document.querySelector('.tc'));
}
function _adsFilProduit(p){
  _adsState.filProduit=(_adsState.filProduit===p)?'Tous':p;
  _adsRender(document.querySelector('.tc'));
}
function _adsSetTri(k){
  if(_adsState.tri===k) _adsState.triDir*=-1;
  else{_adsState.tri=k;_adsState.triDir=-1;}
  _adsRender(document.querySelector('.tc'));
}
function _adsReset(){
  _adsState.filAdset='Tous';_adsState.filVerdict='Tous';_adsState.filProduit='Tous';
  _adsState.tri='spend';_adsState.triDir=-1;
  _adsRender(document.querySelector('.tc'));
}
function _adsRefresh(){
  delete _apiCache['campagnes_meta'];
  rMehdiAds(document.querySelector('.tc'));
}

// Auto-login apres toutes les definitions
var sv = localStorage.getItem('vp');
if(sv && PINS[sv]){P=sv;launch();}
</script>
